server:
  port: 8080

spring:
  application:
    name: mis-gateway
  main:
    web-application-type: reactive
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: mis-auth
          uri: http://localhost:8101
          order: -10
          predicates:
            - Path=/api/v1/auth/**
        - id: mis-audit
          uri: http://localhost:8106
          order: -9
          predicates:
            - Path=/api/v1/audit/**
        - id: mis-admin-bff
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/**
          filters:
            - StripPrefix=0

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.mis: DEBUG

mis:
  security:
    gateway:
      enabled: true
    jwt:
      public-key-path: ${JWT_PUBLIC_KEY_PATH:}
