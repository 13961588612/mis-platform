server:
  port: 8101

spring:
  application:
    name: mis-auth
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mis_platform}
    username: ${DB_USER:mis}
    password: ${DB_PASSWORD:mis123}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

mis:
  auth:
    captcha-enabled: ${AUTH_CAPTCHA_ENABLED:true}
    max-login-failures: 5
    login-lock-seconds: 1800
  security:
    jwt:
      private-key-path: ${JWT_PRIVATE_KEY_PATH:}
      public-key-path: ${JWT_PUBLIC_KEY_PATH:}
      access-token-ttl-seconds: 7200
      refresh-token-ttl-seconds: 604800

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.mis.auth: DEBUG
