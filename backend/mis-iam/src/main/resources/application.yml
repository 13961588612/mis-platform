server:
  port: 8102

spring:
  application:
    name: mis-iam
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mis_platform}
    username: ${DB_USER:mis}
    password: ${DB_PASSWORD:mis123}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.mis.iam: DEBUG

mis:
  iam:
    org-check-enabled: true
    org-discovery-enabled: false
    org-service-id: mis-org
    org-base-url: http://localhost:8103
    default-password: Mis@123456
    system-discovery-enabled: false
    system-service-id: mis-system
    system-base-url: http://localhost:8105
    permissions-ttl-minutes: 15
