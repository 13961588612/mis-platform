# Alembic configuration for the AI Platform backend.
#
# The database URL is read from the application Settings (environment variables)
# via alembic/env.py at runtime. This file only declares the script location.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Default URL - overridden by env.py which reads from src.config.get_settings()
sqlalchemy.url = postgresql://aiplatform:aiplatform_dev_password@postgres:5432/ai_platform

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
