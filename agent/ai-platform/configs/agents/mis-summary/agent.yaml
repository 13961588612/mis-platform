# =============================================================================
# mis-summary — MIS 风险/详情摘要助手
# 供 mis-admin-bff AiProxyController /ai/summary 调用。
# 输出强制为结构化 JSON：{ points: [str], citations: [str] }
# =============================================================================

agent:
  name: mis-summary
  display_name: MIS 摘要助手
  description: >
    面向 MIS 业务详情/审批场景的结构化摘要助手，将一组业务记录压缩为要点清单。
  version: "1.0.0"
  tags:
    - mis
    - summary

  includes:
    runtime: runtime/runtime.yaml
    system: system/model.yaml

  routing:
    enabled: false
    priority: 10
    keywords: []

  memory:
    static:
      enabled: true
      personality: memory/personality.md
      facts_dir: memory/facts/
    dynamic:
      enabled: true
      collection: agent_memory_index
      top_k: 5
      write_back: true
      ttl_days: 30
      max_per_user: 200

  push:
    enabled: false
    channels: []
