# =============================================================================
# crm-policies.yaml — CRM 业务规则与政策事实知识
# =============================================================================

# ---------------------------------------------------------------------------
# 会员等级体系
# ---------------------------------------------------------------------------
member_tiers:
  description: 会员等级规则

  tiers:
    - name: 普通会员
      code: NORMAL
      min_points: 0
      benefits:
        - "基础积分累计"
        - "生日优惠券"
    - name: 银卡会员
      code: SILVER
      min_points: 1000
      benefits:
        - "积分 1.2 倍"
        - "专属客服通道"
    - name: 金卡会员
      code: GOLD
      min_points: 5000
      benefits:
        - "积分 1.5 倍"
        - "每月专属活动"
    - name: 钻石会员
      code: DIAMOND
      min_points: 20000
      benefits:
        - "积分 2 倍"
        - "新品优先体验"
        - "专属客户经理"

  upgrade_rules:
    - "等级按累计有效积分自动升级，每日凌晨批处理"
    - "降级保护期 90 天，期间消费可保级"
    - "等级变更后权益即时生效"

# ---------------------------------------------------------------------------
# 积分规则
# ---------------------------------------------------------------------------
points:
  description: 会员积分政策

  earn_rules:
    - rule: "消费积分"
      rate: "每消费 1 元积 1 分（金卡及以上按等级倍率）"
    - rule: "活动积分"
      rate: "按营销活动规则额外发放"
    - rule: "签到积分"
      rate: "每日签到 5 分，连续 7 天额外 20 分"

  redeem_rules:
    - "100 积分 = 1 元抵扣（部分品类除外）"
    - "单笔订单积分抵扣不超过应付金额 30%"
    - "积分不可兑换现金"

  expiry:
    - "普通消费积分有效期 12 个月"
    - "活动赠送积分按活动规则单独设定有效期"
    - "过期前 30 天通过短信/企微提醒"

  adjustment:
    - "人工调整需填写原因并经 CRM 管理员审批"
    - "单次调整幅度超过 5000 分需门店经理复核"
    - "所有调整记录永久审计"

# ---------------------------------------------------------------------------
# 标签与客户画像
# ---------------------------------------------------------------------------
tags_and_profile:
  description: 会员标签与画像规则

  tag_categories:
    - name: 消费偏好
      examples: [高频消费, 价格敏感, 品质导向]
    - name: 生命周期
      examples: [新客, 活跃, 沉睡, 流失预警]
    - name: 渠道来源
      examples: [门店, 小程序, 第三方平台]

  profile_dimensions:
    - "近 90 天消费频次与客单价"
    - "偏好品类与品牌"
    - "最近触达渠道与响应率"
    - "生命周期阶段与流失风险评分"

  update_frequency:
    tags: "T+1 批量更新，关键行为实时触发"
    profile: "每日凌晨全量刷新"

# ---------------------------------------------------------------------------
# 营销活动
# ---------------------------------------------------------------------------
marketing:
  description: 营销活动管理规则

  campaign_types:
    - type: 满减
      description: "满额减免"
    - type: 积分翻倍
      description: "指定时段积分加倍"
    - type: 会员专享
      description: "限定等级参与"
    - type: 召回
      description: "针对沉睡会员的唤醒活动"

  status_flow:
    - "planned → active → ended"
    - "active 状态的活动不可修改核心规则"

  eligibility_check:
    - "参与前校验会员等级、标签与黑名单"
    - "同一活动每人限参与次数按活动配置执行"

# ---------------------------------------------------------------------------
# 客户旅程
# ---------------------------------------------------------------------------
customer_journey:
  description: 客户旅程追踪规则

  touchpoints:
    - 门店消费
    - 小程序浏览
    - 客服咨询
    - 营销活动触达
    - 积分兑换

  lifecycle_stages:
    - stage: 认知
      criteria: "首次注册或首次到店"
    - stage: 活跃
      criteria: "近 30 天有消费或互动"
    - stage: 沉睡
      criteria: "30-90 天无消费"
    - stage: 流失
      criteria: "超过 90 天无消费"

  query_notes:
    - "旅程数据默认展示近 90 天"
    - "跨渠道身份通过会员 ID 归一"
