# 测试环境共享配置（可与 Nacos test 命名空间内容保持一致）

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mis_platform}
    username: ${DB_USER:mis}
    password: ${DB_PASSWORD:mis123}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

mis:
  security:
    jwt:
      public-key-path: ${JWT_PUBLIC_KEY_PATH:./keys/public.pem}
