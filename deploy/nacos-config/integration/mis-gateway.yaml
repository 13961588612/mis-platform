server:
  port: 8080

spring:
  cloud:
    nacos:
      discovery:
        enabled: true
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: mis-auth-me
          uri: lb://mis-admin-bff
          order: -20
          predicates:
            - Path=/api/v1/auth/me
        - id: mis-auth
          uri: lb://mis-auth
          order: -10
          predicates:
            - Path=/api/v1/auth/**
        - id: mis-audit
          uri: lb://mis-audit
          order: -9
          predicates:
            - Path=/api/v1/audit/**
        - id: mis-admin-bff
          uri: lb://mis-admin-bff
          predicates:
            - Path=/api/v1/**

mis:
  security:
    gateway:
      enabled: true
