server:
  port: 8080

spring:
  cloud:
    nacos:
      discovery:
        enabled: true
    gateway:
      routes:
        - id: mis-auth
          uri: lb://mis-auth
          order: -10
          predicates:
            - Path=/api/v1/auth/**
        - id: mis-audit
          uri: lb://mis-audit
          order: -9
          predicates:
            - Path=/api/v1/audit/**
        - id: mis-admin-bff
          uri: lb://mis-admin-bff
          predicates:
            - Path=/api/v1/**

mis:
  security:
    gateway:
      enabled: true
    jwt:
      public-key-path: ${JWT_PUBLIC_KEY_PATH:/etc/mis/keys/public.pem}
