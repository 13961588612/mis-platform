# =============================================================================
# MIS × ai-platform 融合部署 — ai-platform 叠加层（Overlay）
# =============================================================================
# 用法（与开发基础设施叠加）：
#   docker compose -f deploy/docker-compose.dev.yml -f deploy/docker-compose.ai.yml up -d --build
#
# 设计（见 docs/ai-fusion/ai-fusion-deploy-decision.md 决策三 / DEP-0~DEP-6）：
#  - 本文件与主栈 deploy/docker-compose.dev.yml 共享默认网络，故 agent service
#    可直接以服务名 postgres / redis / nacos 互通（DEP-0）。
#  - 复用主栈 postgres（ai_platform 库）、redis（db 2 + aip: 前缀），不另起实例（DEP-1/DEP-2）。
#  - 删除 ai-platform 独立 nginx/postgres/redis（infra/docker-compose.yml）；
#    新增共享边缘 nginx edge-nginx（DEP-3），并承担 H5 静态托管 + /api、/ws 反代（DEP-6）。
#  - qdrant / embedding / outbound-proxy / gateway / backend / frontend 进入本文件（DEP-4）。
#
# 说明：ai-platform-gateway 暂用 development target（tsx 直跑，免 tsc 构建），
# 因其存在与融合无关的既有基线类型错误（见交付说明）。待网关侧修复后改为 production。
# =============================================================================

services:
  # ===== 共享边缘 nginx（H5 静态 + 通路 B 反代）===== DEP-3 / DEP-6
  edge-nginx:
    image: nginx:1.25-alpine
    container_name: ai-edge-nginx
    depends_on:
      ai-platform-frontend:
        condition: service_completed_successfully
      ai-platform-gateway:
        condition: service_healthy
    ports:
      - "${EDGE_NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/edge.conf:/etc/nginx/conf.d/default.conf:ro
      - ai-h5-static:/usr/share/nginx/html:ro
    restart: unless-stopped

  # ===== Qdrant 向量库 ===== DEP-4
  ai-platform-qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: ai-platform-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__HTTP_PORT: "6333"
      QDRANT__LOG_LEVEL: "INFO"
    volumes:
      - ai-platform-qdrant_data:/qdrant/storage
      - ../agent/ai-platform/infra/init-qdrant.sh:/qdrant/init-qdrant.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== 本地 Embedding 模型（bge-small-zh-v1.5）===== DEP-4
  ai-platform-embedding:
    build:
      context: ../agent/ai-platform/infra
      dockerfile: Dockerfile.embedding
    container_name: ai-platform-embedding
    restart: unless-stopped
    environment:
      MODEL_NAME: "BAAI/bge-small-zh-v1.5"
      PORT: 8001
      MAX_BATCH_SIZE: 32
    volumes:
      - ai-platform-embedding_models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ===== 出站代理（Squid，LLM API 白名单）===== DEP-4
  ai-platform-outbound-proxy:
    build:
      context: ../agent/ai-platform/infra
      dockerfile: Dockerfile.outbound-proxy
    container_name: ai-platform-outbound-proxy
    restart: unless-stopped
    volumes:
      - ../agent/ai-platform/infra/outbound-proxy/squid.conf:/etc/squid/squid.conf:ro
      - ai-platform-outbound_proxy_logs:/var/log/squid

  # ===== TS Gateway（通路 B 入口，Fastify :3100）===== DEP-2 / DEP-4 / DEP-7
  ai-platform-gateway:
    build:
      context: ../agent/ai-platform/gateway
      dockerfile: ../infra/Dockerfile.gateway
      target: development
    container_name: ai-platform-gateway
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3100
      # 共享主 Redis（db 2 + aip: 前缀，与 backend redis-py 端一致）
      REDIS_URL: redis://redis:6379/2
      REDIS_KEY_PREFIX: "aip:"
      # 后端服务名（ai-platform-backend:8000）
      BACKEND_URL: http://ai-platform-backend:8000
      AGENT_CORE_API_URL: http://ai-platform-backend:8000
      # 网关自有 HS256（iss=ai-platform）
      JWT_SECRET: ${GATEWAY_JWT_SECRET:-change-me-in-production}
      JWT_ISSUER: ai-platform
      # 嵌入鉴权：信任 MIS RS256 JWT（加载主栈挂载的 MIS 公钥）
      MIS_JWT_PUBLIC_KEY_PATH: /keys/public.pem
      MIS_JWT_ISSUER: mis-platform
      LOG_LEVEL: info
    volumes:
      - ../backend/keys:/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-platform-qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===== Agent Core Backend（Python/FastAPI :8000）===== DEP-1 / DEP-2 / DEP-4
  ai-platform-backend:
    build:
      context: ../agent/ai-platform/backend
      dockerfile: ../infra/Dockerfile.backend
      target: production
    container_name: ai-platform-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: ${AI_ENVIRONMENT:-production}
      DEBUG: "false"
      HOST: "0.0.0.0"
      PORT: 8000
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      # PostgreSQL（共享主实例，ai_platform 库，专属角色 aiplatform）
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: aiplatform
      POSTGRES_PASSWORD: aiplatform_dev_password
      POSTGRES_DB: ai_platform
      # Redis（共享主实例，db 2 + aip: 前缀）
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 2
      REDIS_KEY_PREFIX: "aip:"
      # 依赖服务
      QDRANT_HOST: ai-platform-qdrant
      QDRANT_PORT: 6333
      EMBEDDING_SERVICE_URL: http://ai-platform-embedding:8001
      OUTBOUND_PROXY_HOST: ai-platform-outbound-proxy
      OUTBOUND_PROXY_PORT: 3128
      GATEWAY_HOST: ai-platform-gateway
      GATEWAY_PORT: 3100
      CONFIG_BASE_PATH: /app/configs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-platform-qdrant:
        condition: service_healthy
      ai-platform-embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ===== H5 前端（构建静态产出 → ai-h5-static 卷，由 edge-nginx 托管）===== DEP-4 / DEP-6 / O4
  # 生产形态：仅构建静态包并写入共享卷，不保留 H5 常驻容器。
  ai-platform-frontend:
    image: node:22-alpine
    container_name: ai-platform-frontend-build
    working_dir: /app
    restart: "no"
    environment:
      NODE_ENV: production
      # 相对路径，反代由 edge-nginx 完成（R6：勿改绝对地址）
      VITE_API_BASE_URL: /api
      VITE_WS_BASE_URL: /ws
    volumes:
      - ../agent/ai-platform/frontend:/app
      - ai-h5-static:/h5
    # 构建门禁放宽（open item #1）：容器构建跳过 tsc 类型检查，直接 vite build。
    # 说明：package.json 的 build 脚本仍保留 "tsc -b && vite build" 供本地 IDE/CI 类型检查；
    # 仅容器内产出静态产物时跳过 tsc（既有 13 处类型错误与融合无关，已登记技术债），
    # 以保证 edge-nginx 能拉起 H5（DEP-6）。
    command: >
      sh -c "npm ci --ignore-scripts && npx vite build && cp -rf dist/* /h5/ && echo 'H5 static built into /h5'"

# ===== Named Volumes =====
volumes:
  ai-h5-static:
    driver: local
  ai-platform-qdrant_data:
    driver: local
  ai-platform-embedding_models:
    driver: local
  ai-platform-outbound_proxy_logs:
    driver: local
