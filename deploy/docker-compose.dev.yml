# MIS Platform — 本地开发基础设施
# 用法: docker compose -f deploy/docker-compose.dev.yml up -d
#
# Nacos 使用 PostgreSQL 外置存储（库名 nacos，与 mis_platform 隔离）
# 微服务 local 模式不连 Nacos；remote 模式见 docs/devops/README.md

services:
  postgres:
    image: postgres:16-alpine
    container_name: mis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - mis-pg-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: mis-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - mis-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: mis-nacos
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./nacos/nacos-standalone-pg.env
    environment:
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./nacos/server/application.properties:/home/nacos/conf/application.properties:ro
      - mis-nacos-logs:/home/nacos/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8848/nacos/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 60s

  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: mis-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mis-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  mis-pg-data:
  mis-redis-data:
  mis-nacos-logs:
  mis-minio-data:
