# 导入测试 Nacos 的配置模板（Data ID 与微服务 bootstrap 一致）
# Namespace: test | Group: MIS_GROUP
#
# 控制台导入或使用 scripts/import-nacos-config.ps1

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mis_platform}
    username: ${DB_USER:mis}
    password: ${DB_PASSWORD:mis123}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mis:
  security:
    jwt:
      public-key-path: ${JWT_PUBLIC_KEY_PATH:./keys/public.pem}
