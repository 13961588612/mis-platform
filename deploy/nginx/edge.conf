# =============================================================================
# 共享边缘 nginx — Agent H5 独立入口 + 通路 B 反代
# =============================================================================
# 挂载为 /etc/nginx/conf.d/default.conf（主 nginx.conf 已 include conf.d/*.conf）。
#
# 职责（见 docs/ai-fusion/ai-fusion-deploy-decision.md 决策一 / DEP-3 / DEP-6）：
#  - 托管 H5 静态产物（由 ai-platform-frontend 构建期写入 ai-h5-static 卷）
#  - /api、/ws 反代到 TS gateway（ai-platform-gateway:3100）
#    H5 构建期 VITE_API_BASE_URL=/api、VITE_WS_BASE_URL=/ws 为相对路径，
#    由本 nginx 改写目标（保留 /api、/ws 前缀），H5 代码无需改动（R6）
#  - 允许被父系统以 iframe 内嵌：下发 CSP frame-ancestors 白名单，
#    且不发送 X-Frame-Options: DENY（避免阻断嵌入）
#  - WebSocket Upgrade/Connection 透传（/ws 路径，R7）
#
# ⚠️ 运维须按实际部署域修改：
#    - server_name / frame-ancestors 白名单（可信父域）
#    - CORS Access-Control-Allow-Origin（父系统页直接调用 agent API 时）
# =============================================================================

upstream ai_gateway_upstream {
    server ai-platform-gateway:3100;
    keepalive 32;
}

server {
    listen 80;
    server_name agent.*;

    # 可被 iframe 内嵌：仅放行可信父域（按部署域修改白名单）
    add_header Content-Security-Policy "frame-ancestors https://mis.local https://*.mis.local" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===== 静态资源（带缓存）=====
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json)$ {
        root /usr/share/nginx/html;
        expires 1d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ===== REST API → TS gateway（保留 /api 前缀）=====
    location /api/ {
        proxy_pass http://ai_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 跨域（父系统页直接调用 agent API 时；同源 H5 不需要）
        # 按部署域修改 Allow-Origin，且与 credentials 配合不可为 *
        add_header Access-Control-Allow-Origin "https://mis.local" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Trace-Id, X-Channel" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;

        # SSE（/api/events/stream）须关闭代理缓冲，否则事件被攒批后才下发（DEP-6）
        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ===== WebSocket → TS gateway（Upgrade 透传，R7）=====
    location /ws {
        proxy_pass http://ai_gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # ===== SPA 兜底（前端 history 路由）=====
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # ===== nginx 健康检查 =====
    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
