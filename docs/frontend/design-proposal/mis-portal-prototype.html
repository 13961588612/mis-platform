<!DOCTYPE html>
<!-- 设计系统：企业靛 shadcn（portal-design-tokens.md / design-system.md）· 门户 + 子系统框架高保真原型 -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MIS Platform · 门户化原型</title>
<style>
/* ============================================================
   令牌（Light = :root / Dark = .dark）— 1:1 来自 portal-design-tokens.md
   ============================================================ */
:root {
  /* 商务现代：画布柔和冷灰，白卡浮起；侧栏中灰冷（略深于画布），轻层次框架、统一不抢焦点 */
  --background: 214 32% 96.5%;
  --foreground: 222.2 47% 11%;
  --card: 0 0% 100%;
  --card-foreground: 222.2 47% 11%;
  --popover: 0 0% 100%;
  --popover-foreground: 222.2 47% 11%;
  --muted: 214 32% 93%;
  --muted-foreground: 215 19% 42%;
  --border: 214 30% 88%;
  --input: 214 30% 88%;
  --ring: 243 75% 59%;

  /* 中灰冷侧栏：略深于冷灰画布，形成轻层次框架（商务、统一、不抢焦点） */
  --sidebar: 214 32% 90%;
  --sidebar-foreground: 222 47% 11%;
  --sidebar-border: 214 30% 82%;
  --sidebar-accent: 214 32% 84%;
  --sidebar-muted: 215 16% 45%;

  --primary: 243 75% 59%;
  --primary-foreground: 0 0% 100%;
  --secondary: 214 32% 93%;
  --secondary-foreground: 222.2 47% 11%;
  --accent: 214 32% 93%;
  --accent-foreground: 222.2 47% 11%;
  --destructive: 0 72% 51%;
  --destructive-foreground: 0 0% 100%;

  --success: 142 71% 40%;
  --success-foreground: 0 0% 100%;
  --warning: 35 92% 48%;
  --warning-foreground: 35 92% 12%;
  --info: 199 89% 46%;
  --info-foreground: 0 0% 100%;

  --radius: 0.375rem;
  --sidebar-width: 16rem;
  --sidebar-width-collapsed: 4rem;
  --header-height: 3.5rem;

  /* 静息 + 抬升阴影：让卡片在冷灰画布上稳稳落地 */
  --card-shadow: 0 1px 2px rgb(15 23 42 / .04), 0 2px 6px -2px rgb(15 23 42 / .08);
  --card-hover-shadow: 0 10px 30px -12px rgb(15 23 42 / .22);

  /* 品牌渐变（靛蓝洗染 + 柔光晕），语义化引用 */
  --portal-gradient: linear-gradient(135deg, hsl(243 75% 59% / .12) 0%, hsl(243 75% 59% / .03) 52%, hsl(199 89% 48% / .07) 100%);
  --portal-card-accent: 243 75% 59%;
  --icon-badge-bg: 243 75% 59% / 0.10;
  --icon-badge-fg: 243 75% 59%;
  --portal-ring: 243 75% 59%;
  /* 登录页背景图（默认内置 SVG 抽象商务底图；可替换为真实图片 url） */
  --login-bg-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='800' viewBox='0 0 1200 800'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%230b1020'/><stop offset='1' stop-color='%231e2a4d'/></linearGradient><radialGradient id='r1' cx='18%' cy='22%' r='55%'><stop offset='0' stop-color='%234f46e5' stop-opacity='0.6'/><stop offset='1' stop-color='%234f46e5' stop-opacity='0'/></radialGradient><radialGradient id='r2' cx='88%' cy='82%' r='60%'><stop offset='0' stop-color='%233b82f6' stop-opacity='0.5'/><stop offset='1' stop-color='%233b82f6' stop-opacity='0'/></radialGradient><pattern id='dots' width='30' height='30' patternUnits='userSpaceOnUse'><circle cx='2' cy='2' r='1.5' fill='%23ffffff' fill-opacity='0.10'/></pattern></defs><rect width='1200' height='800' fill='url(%23g)'/><rect width='1200' height='800' fill='url(%23r1)'/><rect width='1200' height='800' fill='url(%23r2)'/><rect width='1200' height='800' fill='url(%23dots)'/><g stroke='%23ffffff' stroke-opacity='0.12' stroke-width='1.5' fill='none'><path d='M120 640 L360 470 L560 560 L820 360 L1060 470'/><path d='M200 720 L420 540 L640 620 L900 420'/></g><g fill='%23ffffff' fill-opacity='0.5'><circle cx='360' cy='470' r='5'/><circle cx='560' cy='560' r='5'/><circle cx='820' cy='360' r='5'/><circle cx='1060' cy='470' r='5'/><circle cx='420' cy='540' r='5'/><circle cx='900' cy='420' r='5'/></g></svg>");

  --motion-enter: 200ms cubic-bezier(0.4, 0, 0.2, 1);
  --motion-hover: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --motion-lift: -2px;
  --stagger-1: 0ms; --stagger-2: 60ms; --stagger-3: 120ms;
  --stagger-4: 180ms; --stagger-5: 240ms; --stagger-6: 300ms;
}
.dark {
  /* 深底画布略提一档，白卡再亮一档，保持层次（商务深色） */
  --background: 222 47% 7%;
  --foreground: 210 40% 96%;
  --card: 222 40% 12%;
  --card-foreground: 210 40% 96%;
  --popover: 222 40% 12%;
  --popover-foreground: 210 40% 96%;
  --muted: 217.2 33% 18%;
  --muted-foreground: 215 20% 68%;
  --border: 217.2 33% 20%;
  --input: 217.2 33% 20%;
  --ring: 243 75% 66%;

  --sidebar: 217 33% 14%;
  --sidebar-foreground: 210 40% 96%;
  --sidebar-border: 217 33% 22%;
  --sidebar-accent: 217 33% 20%;
  --sidebar-muted: 215 18% 62%;

  --primary: 243 75% 66%;
  --primary-foreground: 222.2 47.4% 11%;
  --secondary: 217.2 32.6% 17.5%;
  --secondary-foreground: 210 40% 98%;
  --accent: 217.2 32.6% 17.5%;
  --accent-foreground: 210 40% 98%;
  --destructive: 0 62.8% 45%;
  --destructive-foreground: 210 40% 98%;

  --success: 142 69% 55%;
  --success-foreground: 144 80% 10%;
  --warning: 38 92% 58%;
  --warning-foreground: 38 92% 12%;
  --info: 199 89% 56%;
  --info-foreground: 199 90% 10%;

  --card-shadow: 0 1px 2px rgb(0 0 0 / .4), 0 2px 8px -2px rgb(0 0 0 / .5);
  --card-hover-shadow: 0 12px 32px -12px rgb(0 0 0 / .6);

  --portal-gradient: linear-gradient(135deg, hsl(243 75% 66% / .18) 0%, hsl(243 75% 66% / .04) 52%, hsl(199 89% 58% / .10) 100%);
  --portal-card-accent: 243 75% 66%;
  --icon-badge-bg: 243 75% 66% / 0.16;
  --icon-badge-fg: 243 75% 66%;
  --portal-ring: 243 75% 66%;
}

/* ============================================================ 基础 ============================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; height: 100%; }
body {
  margin: 0;
  font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  background: hsl(var(--background));
  color: hsl(var(--foreground));
  line-height: 1.6;
  height: 100%;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
.hidden { display: none !important; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
.flex { display: flex; }
.items-center { align-items: center; }
.gap-2 { gap: .5rem; }

/* 图标尺寸 */
.ic { width: 1.25rem; height: 1.25rem; }
.ic-sm { width: 1rem; height: 1rem; }
.ic-xs { width: .875rem; height: .875rem; }
.ic-lg { width: 1.5rem; height: 1.5rem; }

/* 聚焦可见（等价于 ring-ring） */
a:focus-visible, button:focus-visible, input:focus-visible, .subcard:focus-visible,
.nav-item:focus-visible, .tab:focus-visible, .quick-card:focus-visible, .chip:focus-visible,
.icon-btn:focus-visible, .dropdown-item:focus-visible {
  outline: none;
  box-shadow: 0 0 0 2px hsl(var(--ring));
  border-radius: var(--radius);
}

/* 原生 button 重置：避免浏览器默认灰底在深色侧栏上露出（典型如 .nav-item） */
button { background: transparent; border: 0; font: inherit; color: inherit; cursor: pointer; }

/* ============================================================ 按钮 ============================================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
  border: 1px solid transparent; border-radius: var(--radius);
  padding: .5rem .875rem; font-size: .875rem; font-weight: 500;
  background: transparent; color: hsl(var(--foreground));
  transition: background var(--motion-hover), filter var(--motion-hover), border-color var(--motion-hover);
  min-height: 2.25rem;
}
.btn-primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }
.btn-primary:hover { filter: brightness(.95); }
.btn-outline { border-color: hsl(var(--border)); background: hsl(var(--card)); }
.btn-outline:hover { background: hsl(var(--accent)); color: hsl(var(--accent-foreground)); }
.btn-ghost:hover { background: hsl(var(--accent)); color: hsl(var(--accent-foreground)); }
.icon-btn {
  position: relative; display: inline-flex; align-items: center; justify-content: center;
  width: 2.25rem; height: 2.25rem; border-radius: var(--radius);
  background: transparent; color: hsl(var(--foreground)); border: none;
  transition: background var(--motion-hover), color var(--motion-hover);
}
.icon-btn:hover { background: hsl(var(--accent)); color: hsl(var(--accent-foreground)); }

.input {
  width: 100%; border: 1px solid hsl(var(--input)); background: hsl(var(--background));
  border-radius: var(--radius); padding: .5rem .75rem; font-size: .875rem; color: hsl(var(--foreground));
  transition: border-color var(--motion-hover);
}
.input:focus { outline: none; border-color: hsl(var(--ring)); box-shadow: 0 0 0 2px hsl(var(--ring) / .35); }
.input::placeholder { color: hsl(var(--muted-foreground)); }

/* ============================================================ 顶栏 AppBar ============================================================ */
.appbar {
  position: sticky; top: 0; z-index: 40;
  height: var(--header-height); display: flex; align-items: center; gap: 1rem;
  padding: 0 1rem; border-bottom: 1px solid hsl(var(--border));
  background: hsl(var(--card));
  box-shadow: 0 1px 3px -1px rgb(15 23 42 / .06);
}
.logo-wrap { display: flex; align-items: center; gap: .5rem; }
.logo-mark {
  width: 1.75rem; height: 1.75rem; border-radius: var(--radius);
  background: linear-gradient(135deg, hsl(243 75% 64%), hsl(262 70% 58%));
  color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .95rem;
  box-shadow: 0 2px 6px -2px hsl(243 75% 59% / .5);
}
.logo-text { font-weight: 600; letter-spacing: -.01em; }
.search-pill {
  display: inline-flex; align-items: center; gap: .5rem;
  border: 1px solid hsl(var(--border)); background: hsl(var(--muted) / .4);
  border-radius: var(--radius); padding: .4rem .7rem; font-size: .8125rem; color: hsl(var(--muted-foreground));
  transition: border-color var(--motion-hover), background var(--motion-hover);
  min-width: 12rem;
}
.search-pill:hover { border-color: hsl(var(--primary) / .35); background: hsl(var(--muted) / .6); }
.kbd {
  margin-left: auto; font-size: .7rem; font-family: ui-monospace, monospace;
  border: 1px solid hsl(var(--border)); border-radius: .3rem; padding: 0 .3rem; color: hsl(var(--muted-foreground));
  background: hsl(var(--background));
}
.bell-dot {
  position: absolute; top: .35rem; right: .35rem; width: .5rem; height: .5rem; border-radius: 9999px;
  background: hsl(var(--destructive)); border: 2px solid hsl(var(--card));
}
.avatar {
  width: 2rem; height: 2rem; border-radius: 9999px; background: hsl(var(--primary)); color: hsl(var(--primary-foreground));
  display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 600; border: none;
}
.menu-btn { display: none; }

/* ============================================================ 下拉菜单 ============================================================ */
.dropdown { position: relative; }
.dropdown-menu {
  position: absolute; right: 0; top: calc(100% + .375rem); min-width: 11rem; z-index: 50;
  background: hsl(var(--popover)); color: hsl(var(--popover-foreground));
  border: 1px solid hsl(var(--border)); border-radius: var(--radius);
  box-shadow: var(--card-hover-shadow); padding: .375rem; display: none;
}
.dropdown-menu.wide { min-width: 16rem; }
.dropdown-menu.open { display: block; }
.dropdown-item {
  display: flex; align-items: center; gap: .5rem; width: 100%; padding: .5rem .625rem;
  border-radius: var(--radius); font-size: .875rem; color: hsl(var(--foreground));
  background: transparent; border: none; text-align: left;
}
.dropdown-item:hover { background: hsl(var(--accent)); color: hsl(var(--accent-foreground)); }
.dropdown-sep { height: 1px; background: hsl(var(--border)); margin: .375rem 0; }
.dropdown-label { font-size: .75rem; color: hsl(var(--muted-foreground)); padding: .25rem .625rem; }

/* 子系统切换触发器（轻量 dropdown-trigger）：透明底、hover 才出浅底、文字 foreground、图标 muted */
/* 避免与侧栏激活态 nav-item（蓝底白字）竞争主色焦点 — 方案 B */
.sub-switcher { color: hsl(var(--foreground)); }
.sub-switcher svg { color: hsl(var(--muted-foreground)); }

/* ============================================================ 视图 A：登录（分屏大气版） ============================================================ */
.login-wrap {
  min-height: 100vh; display: grid; grid-template-columns: 1.05fr 1fr;
  background: hsl(var(--background));
}
/* 左侧品牌区：背景图片 + 深色渐变压暗，保证文字可读 */
.login-aside {
  position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between;
  padding: 3.5rem; color: #fff; background-image: var(--login-bg-image);
  background-size: cover; background-position: center;
}
.login-aside::after {
  content: ''; position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(135deg, hsl(222 47% 13% / .82) 0%, hsl(243 75% 32% / .55) 100%);
}
.login-aside > * { position: relative; z-index: 1; }
.login-brand { display: flex; align-items: center; gap: .625rem; }
.login-brand .lm-logo {
  width: 2.25rem; height: 2.25rem; border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1.1rem; color: #fff;
  background: linear-gradient(135deg, hsl(243 75% 59%), hsl(262 83% 58%));
  box-shadow: 0 6px 18px -6px hsl(243 75% 59% / .8);
}
.login-brand .lm-name { font-size: 1.05rem; font-weight: 600; letter-spacing: .02em; }
.login-hero-title { font-size: 2.25rem; line-height: 1.25; font-weight: 700; letter-spacing: -.01em; }
.login-hero-sub { margin-top: .75rem; font-size: .95rem; line-height: 1.6; color: hsl(210 40% 92% / .82); max-width: 30rem; }
.login-feats { list-style: none; margin: 1.75rem 0 0; padding: 0; display: grid; gap: .875rem; }
.login-feats li { display: flex; align-items: center; gap: .625rem; font-size: .9rem; color: hsl(210 40% 96% / .92); }
.login-feats .fi {
  width: 1.5rem; height: 1.5rem; border-radius: 9999px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  background: hsl(243 75% 59% / .28); color: #fff;
}
.login-aside-foot { font-size: .75rem; color: hsl(210 40% 92% / .6); }
/* 右侧表单区 */
.login-main { display: flex; align-items: center; justify-content: center; padding: 2.5rem; }
.login-card {
  width: 100%; max-width: 26rem; background: hsl(var(--card));
  border: 1px solid hsl(var(--border)); border-radius: var(--radius); padding: 2.25rem; box-shadow: var(--card-shadow);
}
.login-card h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -.01em; }
.login-sub { margin-top: .4rem; font-size: .875rem; color: hsl(var(--muted-foreground)); }
.login-form { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.field-label { display: block; font-size: .8125rem; font-weight: 500; margin-bottom: .375rem; }
.captcha-row { display: flex; gap: .5rem; }
.captcha {
  width: 8rem; flex-shrink: 0; height: 2.5rem; display: flex; align-items: center; justify-content: center;
  background: hsl(var(--muted)); border: 1px solid hsl(var(--border)); border-radius: var(--radius);
  letter-spacing: .25em; font-family: ui-monospace, monospace; font-weight: 600; color: hsl(var(--foreground));
  cursor: pointer; user-select: none;
}
.alert {
  display: none; gap: .5rem; align-items: flex-start; margin-top: 1rem;
  border: 1px solid hsl(var(--destructive)); background: hsl(var(--destructive) / .08); color: hsl(var(--destructive));
  border-radius: var(--radius); padding: .625rem .75rem; font-size: .8125rem;
}
.alert.show { display: flex; }
.login-foot { margin-top: 1.25rem; font-size: .75rem; color: hsl(var(--muted-foreground)); text-align: center; }
/* 窄屏：隐藏品牌区，表单卡居中 */
@media (max-width: 860px) {
  .login-wrap { grid-template-columns: 1fr; }
  .login-aside { display: none; }
  .login-main { padding: 1.5rem; }
}

/* ============================================================ 视图 B：门户 ============================================================ */
.portal-main { }
.portal-inner { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
.hero {
  background-image: var(--portal-gradient); border: 1px solid hsl(var(--border)); border-radius: var(--radius);
  padding: 1.5rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  box-shadow: var(--card-shadow); position: relative; overflow: hidden;
}
.hero::before { content: ""; position: absolute; right: -48px; top: -48px; width: 180px; height: 180px; border-radius: 9999px; background: radial-gradient(circle, hsl(243 75% 59% / .14), transparent 70%); pointer-events: none; }
.hero > * { position: relative; z-index: 1; }
.hero-greeting { font-size: 1.25rem; font-weight: 600; line-height: 1.4; }
.hero-sub { margin-top: .25rem; font-size: .8125rem; color: hsl(var(--muted-foreground)); }
.hero-pills { display: flex; gap: .5rem; flex-wrap: wrap; }
.pill {
  display: inline-flex; align-items: center; gap: .4rem; border-radius: 9999px; padding: .35rem .75rem;
  font-size: .8125rem; font-weight: 500;
}
.pill-warning { background: hsl(var(--warning) / .1); color: hsl(var(--warning)); }
.pill-info { background: hsl(var(--info) / .1); color: hsl(var(--info)); }

.filterbar {
  display: flex; align-items: center; gap: 1.5rem; border-bottom: 1px solid hsl(var(--border));
  margin-top: 1.75rem; overflow-x: auto;
}
.filter-tab {
  border: none; background: transparent; padding: .5rem 0; font-size: .875rem; color: hsl(var(--muted-foreground));
  border-bottom: 2px solid transparent; white-space: nowrap; transition: color var(--motion-hover);
}
.filter-tab:hover { color: hsl(var(--foreground)); }
.filter-tab.active { border-bottom-color: hsl(var(--primary)); color: hsl(var(--foreground)); font-weight: 500; }

.section { margin-top: 2rem; }
.section-title { display: flex; align-items: center; gap: .5rem; font-size: 1rem; font-weight: 600; }
.section-title .bar { width: .25rem; height: 1rem; border-radius: 9999px; background: hsl(var(--portal-card-accent)); }

.grid-cards { display: grid; grid-template-columns: repeat(1, minmax(0, 1fr)); gap: 1rem; margin-top: 1rem; }
@media (min-width: 640px) { .grid-cards { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
@media (min-width: 1024px) { .grid-cards { grid-template-columns: repeat(3, minmax(0, 1fr)); } } }

.subcard {
  position: relative; display: block; border-radius: var(--radius); border: 1px solid hsl(var(--border));
  background: hsl(var(--card)); padding: 1rem; text-align: left; width: 100%;
  box-shadow: var(--card-shadow);
  transition: transform var(--motion-enter), box-shadow var(--motion-enter), border-color var(--motion-hover);
}
@media (prefers-reduced-motion: no-preference) {
  .subcard:hover { transform: translateY(-2px); box-shadow: var(--card-hover-shadow); border-color: hsl(var(--primary) / .25); }
}
.icon-badge {
  width: 2.5rem; height: 2.5rem; border-radius: 9999px;
  background: hsl(var(--icon-badge-bg)); color: hsl(var(--icon-badge-fg));
  display: flex; align-items: center; justify-content: center;
  transition: transform var(--motion-enter);
}
@media (prefers-reduced-motion: no-preference) { .subcard:hover .icon-badge { transform: scale(1.08); } }
.subcard-title { margin-top: .75rem; font-size: 1rem; font-weight: 600; line-height: 1.3; }
.subcard-desc { margin-top: .25rem; font-size: .75rem; color: hsl(var(--muted-foreground)); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.corner-badge {
  position: absolute; right: .75rem; top: .75rem; border-radius: 9999px; padding: .125rem .5rem; font-size: .7rem; font-weight: 500;
}
.corner-badge.new { background: hsl(var(--primary) / .1); color: hsl(var(--primary)); }
.corner-badge.todo { background: hsl(var(--warning) / .1); color: hsl(var(--warning)); }

.recent { margin-top: 2rem; }
.recent-label { font-size: .8125rem; color: hsl(var(--muted-foreground)); margin-bottom: .5rem; }
.recent-bar { display: flex; gap: .5rem; overflow-x: auto; padding-bottom: .25rem; }
.chip {
  display: inline-flex; align-items: center; gap: .375rem; border-radius: 9999px; border: 1px solid hsl(var(--border));
  background: hsl(var(--card)); padding: .375rem .75rem; font-size: .8125rem; white-space: nowrap;
  transition: border-color var(--motion-hover), background var(--motion-hover);
}
.chip:hover { border-color: hsl(var(--primary) / .3); background: hsl(var(--accent)); }
.chip .ic-xs { color: hsl(var(--muted-foreground)); }

.stat-card { position: relative; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--card-shadow); transition: box-shadow var(--motion-enter); }
@media (prefers-reduced-motion: no-preference) { .stat-card:hover { box-shadow: var(--card-hover-shadow); } }
.stat-label { font-size: .875rem; color: hsl(var(--muted-foreground)); }

}

.block-title { font-size: 1rem; font-weight: 600; margin: 1.5rem 0 .75rem; display: flex; align-items: center; gap: .5rem; }

.quick-card { display: flex; align-items: center; gap: .75rem; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); padding: 1rem; cursor: pointer; transition: border-color var(--motion-hover), background var(--motion-hover); }
.quick-card:hover { border-color: hsl(var(--primary) / .3); background: hsl(var(--accent)); }
.quick-ico { width: 2.25rem; height: 2.25rem; border-radius: var(--radius); background: hsl(var(--icon-badge-bg)); color: hsl(var(--icon-badge-fg)); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.quick-body { flex: 1; min-width: 0; }

.table-wrap { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); overflow: hidden; }
.table-wrap table { width: 100%; border-collapse: collapse; }
.table-wrap thead th {

}

/* 滚动容器：把纵向滚动限制在具体内容区，页面整体不滚动 */

/* 列表视图：筛选卡 + 状态标签固定顶部，仅表格区内部滚动 */
.list-inner { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; padding: 1rem 1.5rem 2rem; }

#list-pager-host { flex-shrink: 0; }
/* 表格滚动区（带边框圆角 + 表头吸顶） */
.table-scroll {
  flex: 1 1 0%; min-height: 0; width: 100%; overflow: auto;
  overscroll-behavior: contain;
  background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius);
}
.table-scroll table { width: 100%; border-collapse: collapse; }
.table-scroll thead th {
  position: sticky; top: 0; z-index: 2;
  text-align: left; font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
  color: hsl(var(--muted-foreground)); padding: .75rem 1rem; background: hsl(var(--muted) / .5); border-bottom: 1px solid hsl(var(--border));
}
.table-scroll tbody td { padding: .75rem 1rem; font-size: .875rem; border-bottom: 1px solid hsl(var(--border)); }
.table-scroll tbody tr:last-child td { border-bottom: none; }
.table-scroll tbody tr { transition: background var(--motion-hover); }
.table-scroll tbody tr:hover { background: hsl(var(--muted) / .4); }
.badge-status { display: inline-flex; align-items: center; gap: .375rem; border-radius: 9999px; padding: .125rem .625rem; font-size: .75rem; font-weight: 500; }

/* ============================================================ 分页 Pager ============================================================ */
.pager {
  display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  margin-top: 1rem; padding: .75rem 1rem; background: hsl(var(--card)); border: 1px solid hsl(var(--border));
  border-radius: var(--radius); font-size: .875rem; color: hsl(var(--muted-foreground));
}

  min-width: 2rem; height: 2rem; padding: 0 .5rem; display: inline-flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid transparent; border-radius: var(--radius); color: hsl(var(--foreground));
  font-size: .875rem; cursor: pointer; transition: background var(--motion-hover), border-color var(--motion-hover), color var(--motion-hover);
}
.pager-btn:hover:not(:disabled):not(.active) { background: hsl(var(--muted) / .6); }

.pager-btn:disabled { opacity: .4; cursor: not-allowed; }

  background: hsl(var(--card)); color: hsl(var(--foreground)); font-size: .875rem; cursor: pointer;
}

}
.badge-status .dot { width: .375rem; height: .375rem; border-radius: 9999px; }
.badge-status.success { background: hsl(var(--success) / .1); color: hsl(var(--success)); } .badge-status.success .dot { background: hsl(var(--success)); }
.badge-status.warning { background: hsl(var(--warning) / .1); color: hsl(var(--warning)); } .badge-status.warning .dot { background: hsl(var(--warning)); }
.badge-status.info { background: hsl(var(--info) / .1); color: hsl(var(--info)); } .badge-status.info .dot { background: hsl(var(--info)); }
.badge-status.destructive { background: hsl(var(--destructive) / .1); color: hsl(var(--destructive)); } .badge-status.destructive .dot { background: hsl(var(--destructive)); }

/* ============================================================ 筛选卡 + 状态标签 ============================================================ */
.filter-card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; flex-shrink: 0; }
.filter-header {
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  padding: 1rem 1.25rem; border-bottom: 1px solid hsl(var(--border)); flex-wrap: wrap;
}

}

.filter-actions .btn { min-height: 2.25rem; }

.status-tabs { display: flex; align-items: center; gap: 1.5rem; border-bottom: 1px solid hsl(var(--border)); margin-bottom: 1rem; overflow-x: auto; flex-shrink: 0; }
.status-tab {

  border-bottom: 2px solid transparent; white-space: nowrap; transition: color var(--motion-hover);

}

.status-tab.active { border-bottom-color: hsl(var(--primary)); color: hsl(var(--foreground)); font-weight: 500; }

/* ============================================================ 抽屉 / 面板 / 命令面板 ============================================================ */
.drawer-overlay, .sheet-overlay, .cmd-overlay {
  position: fixed; inset: 0; background: rgb(15 23 42 / .4); z-index: 55;
  opacity: 0; pointer-events: none; transition: opacity var(--motion-enter);
}

.sheet-panel {
  position: fixed; top: 0; right: 0; bottom: 0; width: min(360px, 90vw); z-index: 56;
  background: hsl(var(--popover)); color: hsl(var(--popover-foreground)); border-left: 1px solid hsl(var(--border));

}

.sheet-footer { padding: 1rem 1.25rem; border-top: 1px solid hsl(var(--border)); }
.ai-msg { background: hsl(var(--muted) / .5); border: 1px solid hsl(var(--border)); border-radius: var(--radius); padding: 1rem; font-size: .875rem; line-height: 1.7; }

/* 表单字段（新建 / 编辑抽屉） */
.field { display: flex; flex-direction: column; gap: .4rem; }
.field-label { font-size: .8125rem; font-weight: 500; color: hsl(var(--foreground)); }
.input {
  width: 100%; padding: .55rem .7rem; border: 1px solid hsl(var(--border)); border-radius: var(--radius);
  font-size: .875rem; color: hsl(var(--foreground)); background: hsl(var(--background));
  font-family: inherit; transition: border-color var(--motion-hover), box-shadow var(--motion-hover);
}
.input:focus { outline: none; border-color: hsl(var(--primary)); box-shadow: 0 0 0 3px hsl(var(--primary) / .15); }
textarea.input { resize: vertical; min-height: 4rem; line-height: 1.5; }
.seg { display: flex; width: 100%; gap: .25rem; padding: .2rem; border: 1px solid hsl(var(--border)); border-radius: var(--radius); background: hsl(var(--muted) / .4); }
.seg-item { flex: 1; text-align: center; padding: .35rem .5rem; font-size: .8125rem; border-radius: calc(var(--radius) - 2px); cursor: pointer; color: hsl(var(--muted-foreground)); transition: background var(--motion-hover), color var(--motion-hover); }
.seg-item.active { background: hsl(var(--card)); color: hsl(var(--foreground)); font-weight: 500; box-shadow: 0 1px 2px rgb(0 0 0 / .08); }

/* 表单 / 筛选：12 列固定宽度栅格（避免输入框强制独占整行，便于对齐显示） */
.form-grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: .875rem 1rem; }
.col-12 { grid-column: span 12; }
.col-8  { grid-column: span 8; }
.col-6  { grid-column: span 6; }
.col-4  { grid-column: span 4; }
.col-3  { grid-column: span 3; }

@media (max-width: 900px) {
  .col-8 { grid-column: span 12; }
  .col-4 { grid-column: span 6; }
  .col-3 { grid-column: span 6; }
  .col-2 { grid-column: span 6; }
}
@media (max-width: 560px) {
  .form-grid > *, .filter-body > * { grid-column: span 12 !important; }
}

.cmd-panel {
  position: fixed; top: 12%; left: 50%; transform: translateX(-50%) translateY(-8px); width: min(560px, 92vw); z-index: 56;
  background: hsl(var(--popover)); border: 1px solid hsl(var(--border)); border-radius: var(--radius);

.cmd-item:hover, .cmd-item.active { background: hsl(var(--accent)); color: hsl(var(--accent-foreground)); }

/* ============================================================ 响应式：<1024px 侧栏转抽屉 ============================================================ */
@media (max-width: 1023px) {
  .sidebar {
    position: fixed; top: var(--header-height); bottom: 0; left: 0; z-index: 54;

/* ===== 系统管理·CRUD 引擎样式（scope 于 .sa-app，与门户组件隔离） ===== */

function $(sel, root = document) { return root.querySelector(sel); }

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }
function greeting() {
  const h = new Date().getHours();
  if (h < 6) return '凌晨好';
  if (h < 11) return '早上好';
  if (h < 13) return '中午好';
  if (h < 18) return '下午好';
  return '晚上好';
}

   ============================================================ */
function initTheme() {
  const saved = localStorage.getItem('mis-theme');
  if (saved === 'dark') document.documentElement.classList.add('dark');
  else if (saved === 'light') document.documentElement.classList.remove('dark');
  else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.classList.add('dark');
}
function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('mis-theme', isDark ? 'dark' : 'light');
}
function themeIcon() { return document.documentElement.classList.contains('dark') ? 'sun' : 'moon'; }

}

  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 4; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

    </button>`).join('');
  $all('#sub-tabbar .tab').forEach(t => {
    t.addEventListener('click', e => {

      activeTab = t.dataset.key;
      renderTabs(); renderSubContent();
    });

  $all('#sub-tabbar .tab-close').forEach(c => c.addEventListener('click', e => {

    closeTab(c.dataset.close);
  }));

function findNav(label) {
  for (const n of activeSub.nav) {
    if (n.label === label) return n;
    if (n.children) { const c = n.children.find(x => x.label === label); if (c) return c; }
  }
  return { label, icon: 'circle' };
}
function activateNav(label) {
  const key = (label === activeSub.nav[0].label) ? 'overview' : 'nav:' + label;
  let t = tabs.find(x => x.key === key);
  if (!t) {
    const nav = findNav(label);
    t = { key: key, label: label, icon: nav.icon };
    tabs.push(t);
  }
  activeTab = key;
  // 同步侧栏激活态
  $all('#sub-sidebar .nav-item').forEach(n => n.classList.toggle('active', n.dataset.label === label));
  renderTabs(); renderSubContent();
}

function closeTab(key) {
  if (tabs.length <= 1) return;
  const idx = tabs.findIndex(t => t.key === key);
  tabs.splice(idx, 1);
  if (activeTab === key) activeTab = tabs[tabs.length - 1].key;
  renderTabs(); renderSubContent();
}

function buildPager(total, totalPages) {
  const cur = listPage;
  const seq = [1];
  for (let n = cur - 1; n <= cur + 1; n++) if (n > 1 && n < totalPages) seq.push(n);
  if (totalPages > 1) seq.push(totalPages);
  const uniq = [...new Set(seq)].sort((a, b) => a - b);
  let html = '', prev = 0;
  uniq.forEach(n => {
    if (n - prev > 1) html += '<span class="pager-ellipsis">…</span>';
    html += `<button class="pager-btn ${n === cur ? 'active' : ''}" data-pg="${n}">${n}</button>`;
    prev = n;
  });
  const controls = `
    <button class="pager-btn" data-pg="prev" aria-label="上一页" ${cur === 1 ? 'disabled' : ''}>‹</button>
    ${html}
    <button class="pager-btn" data-pg="next" aria-label="下一页" ${cur === totalPages ? 'disabled' : ''}>›</button>`;
  return `<div class="pager">
    <div class="pager-info">共 <b>${total}</b> 条 · 第 ${cur}/${totalPages} 页</div>
    <div class="pager-controls">${controls}</div>
    <div class="pager-size">
      <label>每页</label>
      <select class="pager-select" id="pager-size">
        ${[10, 20, 50].map(s => `<option ${s === listPageSize ? 'selected' : ''}>${s}</option>`).join('')}
      </select><span>条</span>
    </div>
  </div>`;
}

function bindPager() {
  $all('#list-pager-host .pager-btn').forEach(b => b.addEventListener('click', () => {
    if (b.disabled) return;
    const pg = b.dataset.pg;
    const totalPages = Math.max(1, Math.ceil(listRows.length / listPageSize));
    if (pg === 'prev') listPage = Math.max(1, listPage - 1);
    else if (pg === 'next') listPage = Math.min(totalPages, listPage + 1);
    else listPage = parseInt(pg, 10);
    paintList();
  }));
  const sel = $('#pager-size');
  if (sel) sel.addEventListener('change', () => {
    listPageSize = parseInt(sel.value, 10); listPage = 1; paintList();
  });
}

function paintList() {
  const host = $('#list-table-host');
  if (!host) return;
  const total = listRows.length;
  const totalPages = Math.max(1, Math.ceil(total / listPageSize));
  if (listPage > totalPages) listPage = totalPages;
  const start = (listPage - 1) * listPageSize;
  const pageRows = listRows.slice(start, start + listPageSize);
  const rows = pageRows.map(renderListRow).join('');
  host.innerHTML = `
    <div class="table-scroll">
      <table>
        <thead><tr><th>记录编号</th><th>名称</th><th>所属组织</th><th>状态</th><th>更新时间</th><th>操作</th></tr></thead>

  $('#list-pager-host').innerHTML = buildPager(total, totalPages);
  bindPager();
}

function onSidebarToggle() {
  const sb = $('#sub-sidebar');

    sb.classList.toggle('open');
  } else {
    sidebarCollapsed = !sidebarCollapsed;
    sb.classList.toggle('collapsed', sidebarCollapsed);

function closeDrawer() {
  const sb = $('#sub-sidebar');

}

/* ============================================================
   下拉菜单
   ============================================================ */
function toggleMenu(menu) {
  const open = menu.classList.contains('open');
  closeAllMenus();
  if (!open) menu.classList.add('open');
}
function closeAllMenus() { $all('.dropdown-menu.open').forEach(m => m.classList.remove('open')); }

/* ============================================================
   命令面板 ⌘K
   ============================================================ */
function openCmd() {
  const overlay = $('#cmd-overlay');
  const panel = $('#cmd-panel');
  const list = $('#cmd-list');
  const input = $('#cmd-input');
  list.innerHTML = subsystems.map(s => `
    <div class="cmd-item" data-id="${s.id}">${icon(s.icon, 'ic-sm')} ${esc(s.name)} <span style="margin-left:auto;color:hsl(var(--muted-foreground));font-size:.75rem">${GROUPS[s.group]}</span></div>
  `).join('');
  overlay.classList.add('open');
  panel.classList.add('open');
  input.value = '';
  setTimeout(() => input.focus(), 50);
  $all('#cmd-list .cmd-item').forEach(it => it.addEventListener('click', () => {
    closeCmd();
    enterSubsystem(it.dataset.id);
  }));
}
function closeCmd() {
  $('#cmd-overlay').classList.remove('open');
  $('#cmd-panel').classList.remove('open');
}

function openSheet() {
  $('#sheet-overlay').classList.add('open');

}

  $('#sheet-overlay').classList.remove('open');
  $('#sheet-panel').classList.remove('open');

function openAdd() {
  const title = $('#add-title');
  if (title) title.textContent = '新建' + (activeSub ? activeSub.name : '') + '记录';

function bindGlobal() {
  document.addEventListener('click', e => {
    if (!e.target.closest('.dropdown')) closeAllMenus();
  });
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openCmd(); }
    if (e.key === 'Escape') { closeCmd(); closeSheet(); closeAdd(); closeDrawer(); closeAllMenus(); }
  });
  // 命令面板输入过滤
  document.addEventListener('input', e => {
    if (e.target.id === 'cmd-input') {
      const q = e.target.value.trim().toLowerCase();
      $all('#cmd-list .cmd-item').forEach(it => {
        const name = it.textContent.toLowerCase();
        it.style.display = name.includes(q) ? '' : 'none';
      });
    }
  });
  let rt;
  window.addEventListener('resize', () => {
    clearTimeout(rt);
    rt = setTimeout(() => { if (window.innerWidth >= 1024) closeDrawer(); }, 150);
  });
}

    columns: [ { key: 'username', label: '操作人' }, { key: 'module', label: '模块' }, { key: 'operation', label: '操作' }, { key: 'request_method', label: '方法' }, { key: 'response_code', label: '状态码' }, { key: 'duration_ms', label: '耗时(ms)' }, { key: 'oper_time', label: '时间' } ],
    form: [],
    sample: [
      { id: 1, username: 'admin', module: '系统管理', operation: '新增组织', request_method: 'POST', request_uri: '/api/v1/orgs', response_code: 200, duration_ms: 23, oper_time: '2026-07-21 10:02:11' },
      { id: 2, username: 'admin', module: '系统管理', operation: '修改角色', request_method: 'PUT', request_uri: '/api/v1/roles/2', response_code: 200, duration_ms: 41, oper_time: '2026-07-21 09:48:30' },
      { id: 3, username: 'wangl', module: '组织管理', operation: '查询部门', request_method: 'GET', request_uri: '/api/v1/depts', response_code: 200, duration_ms: 12, oper_time: '2026-07-20 16:20:05' }
    ]
  }
};

/* 派生展示字段 */
function saDecorate(page, row) {
  const r = Object.assign({}, row);
  if ('status' in r) r.statusText = r.status === 1 ? '启用' : (r.status === 2 ? '锁定' : '禁用');
  if ('gender' in r) r.genderText = r.gender === 1 ? '男' : (r.gender === 2 ? '女' : '—');
  if ('type' in r) {
    if (page.id === 'role') r.typeText = r.type === 1 ? '内置' : '自定义';
    else if (page.id === 'menu') r.typeText = r.type === 1 ? '目录' : (r.type === 2 ? '菜单' : '按钮');
    else if (page.id === 'api') r.typeText = r.type === 'catalog' ? '目录' : '接口';
  }
  if ('data_scope' in r) { const d = saDATA_SCOPE.find(x => x.value === r.data_scope); r.dataScopeText = d ? d.label : '—'; }
  if (page.id === 'role') r.userCount = (r.users || []).length;
  if (page.id === 'dict') r.itemCount = (r.items || '').split('\n').filter(Boolean).length;
  return r;
}

/* ============================================================ 状态与渲染 ============================================================ */
let saCurrent = 'org';
const saData = {};          // id -> 行数组（可增删改）
const saView = { page: 1, pageSize: 10, filters: {} };

function saEnsureData(id) { if (!saData[id]) saData[id] = saPAGES[id].sample.map(r => Object.assign({}, r)); return saData[id]; }

function saRenderContent() {
  const p = saPAGES[saCurrent];
  const rows = saEnsureData(saCurrent).map(r => saDecorate(p, r));
  const filtered = rows.filter(r => {
    return Object.keys(saView.filters).every(k => {
      const f = (p.filters || []).find(x => x.key === k); if (!f) return true;
      const v = saView.filters[k]; if (v === '' || v == null) return true;
      const cell = r[k];
      if (f.type === 'select') return String(cell) === String(v);
      return String(cell == null ? '' : cell).toLowerCase().includes(String(v).toLowerCase());
    });
  });
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / saView.pageSize));
  if (saView.page > pages) saView.page = pages;
  const start = (saView.page - 1) * saView.pageSize;
  const slice = filtered.slice(start, start + saView.pageSize);

  const filterHtml = (p.filters || []).length ? saBuildFilterCard(p) : '';
  const tableHtml = saBuildTable(p, slice);
  const pagerHtml = saBuildPager(total, start, slice.length);
  $('#sa-content').innerHTML = filterHtml + tableHtml + pagerHtml;

  saBindFilters(p);
  saBindPager();
  saBindRowActions(p);
}

function saBuildFilterCard(p) {
  let fields = '<div class="form-grid">';
  (p.filters || []).forEach(f => { fields += '<div class="col-' + (f.col || 4) + '">' + saFieldHTML(f, {}, 'filter') + '</div>'; });
  fields += '</div>';
  return '<div class="filter-card"><div class="fc-body">' + fields + '</div>' +
    '<div class="fc-actions"><button class="btn btn-outline btn-sm" id="fc-reset">重置</button>' +
    '<button class="btn btn-primary btn-sm" id="fc-search">' + icon('search', 'ic-sm') + ' 查询</button></div></div>';
}
function saFieldHTML(f, row, mode) {
  const val = row[f.key];
  const lbl = mode === 'filter' ? f.label : (f.label + (f.required ? '<span class="required">*</span>' : ''));
  if (mode === 'detail') {
    if (f.type === 'tree') return '';
    let v = val;
    if (f.type === 'switch') v = (val === 1 || val === true) ? '启用' : '禁用';
    else if (f.type === 'select') { const o = (f.options || []).find(x => String(x.value) === String(val)); v = o ? o.label : (val || '—'); }
    return '<div class="ro-field"><span class="ro-k">' + esc(f.label) + '</span><span class="ro-v">' + esc(v == null || v === '' ? '—' : v) + '</span></div>';
  }
  let ctrl;
  if (f.type === 'switch') {
    const on = (val === 1 || val === true) ? 'checked' : '';
    ctrl = '<label class="switch"><input type="checkbox" data-key="' + f.key + '" ' + on + '><span class="track"></span><span>' + (on ? '启用' : '禁用') + '</span></label>';
  } else if (f.type === 'select') {
    let opts = '<option value="">请选择</option>';
    (f.options || []).forEach(o => { opts += '<option value="' + esc(o.value) + '"' + (String(val) === String(o.value) ? ' selected' : '') + '>' + esc(o.label) + '</option>'; });
    ctrl = '<select class="input" data-key="' + f.key + '">' + opts + '</select>';
  } else if (f.type === 'textarea') {
    ctrl = '<textarea class="input" data-key="' + f.key + '" placeholder="' + esc(f.placeholder || '') + '">' + esc(val || '') + '</textarea>';
  } else if (f.type === 'tree') {
    ctrl = saBuildPermTree(val || []);
  } else {
    const t = f.type === 'number' ? 'type="number"' : 'type="text"';
    ctrl = '<input class="input" ' + t + ' data-key="' + f.key + '" value="' + esc(val || '') + '" placeholder="' + esc(f.placeholder || '') + '">';
  }
  return '<div class="col-' + (f.col || 6) + '"><label class="field-label">' + lbl + '</label>' + ctrl + '</div>';
}
function saBuildPermTree(checked) {
  function node(n) {
    const has = checked.includes(n.id);
    let h = '<li><label><input type="checkbox" class="pt-cb" value="' + n.id + '"' + (has ? ' checked' : '') + '> ' + esc(n.name) + '</label>';
    if (n.children) { h += '<ul>' + n.children.map(node).join('') + '</ul>'; }
    return h + '</li>';
  }
  return '<div class="perm-tree"><ul>' + saMENU_TREE.map(node).join('') + '</ul></div>';
}
function saBuildTable(p, rows) {
  let head = '<tr>' + p.columns.map(c => '<th>' + esc(c.label) + '</th>').join('') + (p.readonly ? '<th>操作</th>' : '<th>操作</th>') + '</tr>';
  let body = '';
  if (!rows.length) {
    body = '<tr><td class="empty" colspan="' + (p.columns.length + 1) + '">暂无数据</td></tr>';
  } else {
    rows.forEach(r => {
      const actions = p.readonly
        ? '<button class="link-btn" data-act="detail" data-id="' + r.id + '">详情</button>'
        : '<button class="link-btn" data-act="detail" data-id="' + r.id + '">' + icon('eye', 'ic-xs') + ' 详情</button>' +
          '<button class="link-btn" data-act="edit" data-id="' + r.id + '">' + icon('edit', 'ic-xs') + ' 编辑</button>' +
          '<button class="link-btn danger" data-act="delete" data-id="' + r.id + '">' + icon('trash', 'ic-xs') + ' 删除</button>';
      body += '<tr>' + p.columns.map(c => saCellFor(c, r)).join('') + '<td><div class="row-actions">' + actions + '</div></td></tr>';
    });
  }
  return '<div class="table-wrap"><div class="table-scroll"><table><thead>' + head + '</thead><tbody>' + body + '</tbody></table></div></div>';
}
function saStatusCls(s) { return s === 1 ? 'success' : (s === 2 ? 'warning' : 'muted'); }
function saCellFor(c, r) {
  if (c.status) return '<td><span class="badge-status ' + saStatusCls(r.status) + '"><span class="dot"></span>' + esc(r[c.key]) + '</span></td>';
  let v = r[c.key]; if (v == null || v === '') v = '—';
  return '<td>' + esc(v) + '</td>';
}
function saBuildPager(total, start, count) {
  const pages = Math.max(1, Math.ceil(total / saView.pageSize));
  let nums = '';
  const cur = saView.page;
  const range = [];
  if (pages <= 7) { for (let i = 1; i <= pages; i++) range.push(i); }
  else {
    range.push(1); if (cur > 3) range.push('...');
    for (let i = Math.max(2, cur - 1); i <= Math.min(pages - 1, cur + 1); i++) range.push(i);
    if (cur < pages - 2) range.push('...'); range.push(pages);
  }
  range.forEach(i => { nums += i === '...' ? '<span class="pager-ellipsis">…</span>' : '<button class="pager-btn' + (i === cur ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>'; });
  return '<div class="pager"><div class="pager-info">共 <b>' + total + '</b> 条，当前 ' + (total ? (start + 1) + '-' + (start + count) : '0') + '</div>' +
    '<div class="pager-controls">' +
    '<button class="pager-btn" data-page="prev"' + (cur <= 1 ? ' disabled' : '') + '>上一页</button>' + nums +
    '<button class="pager-btn" data-page="next"' + (cur >= pages ? ' disabled' : '') + '>下一页</button></div>' +
    '<div class="pager-size"><label>每页</label><select id="page-size">' + [10, 20, 50].map(n => '<option value="' + n + '"' + (n === saView.pageSize ? ' selected' : '') + '>' + n + ' 条</option>').join('') + '</select></div></div>';
}

/* 绑定 */
function saBindFilters(p) {
  if (!p.filters || !p.filters.length) return;
  const fc = $('#sa-content .filter-card'); if (!fc) return;
  (p.filters || []).forEach(f => { const el = fc.querySelector('[data-key="' + f.key + '"]'); if (el) el.value = saView.filters[f.key] != null ? saView.filters[f.key] : ''; });
  $('#fc-search').addEventListener('click', () => {
    saView.filters = {}; (p.filters || []).forEach(f => { const el = fc.querySelector('[data-key="' + f.key + '"]'); if (el) saView.filters[f.key] = el.value; });
    saView.page = 1; saRenderContent();
  });
  $('#fc-reset').addEventListener('click', () => { saView.filters = {}; saRenderContent(); });
}
function saBindPager() {
  const c = $('#sa-content .pager'); if (!c) return;
  c.querySelectorAll('.pager-btn').forEach(b => b.addEventListener('click', () => {
    const t = b.dataset.page; const pages = Math.max(1, Math.ceil(saCurrentRowsTotal() / saView.pageSize));
    if (t === 'prev') saView.page = Math.max(1, saView.page - 1);
    else if (t === 'next') saView.page = Math.min(pages, saView.page + 1);
    else saView.page = Number(t);
    saRenderContent();
  }));
  const ps = $('#page-size'); if (ps) ps.addEventListener('change', () => { saView.pageSize = Number(ps.value); saView.page = 1; saRenderContent(); });
}
function saCurrentRowsTotal() {
  const p = saPAGES[saCurrent]; const rows = saEnsureData(saCurrent).map(r => saDecorate(p, r));
  return rows.filter(r => Object.keys(saView.filters).every(k => {
    const f = (p.filters || []).find(x => x.key === k); if (!f) return true; const v = saView.filters[k]; if (v === '' || v == null) return true;
    const cell = r[k]; if (f.type === 'select') return String(cell) === String(v);
    return String(cell == null ? '' : cell).toLowerCase().includes(String(v).toLowerCase());
  })).length;
}
function saBindRowActions(p) {
  $all('#sa-content [data-act]').forEach(b => b.addEventListener('click', () => {
    const id = Number(b.dataset.id); const row = saEnsureData(saCurrent).find(r => r.id === id);
    if (!row) return;
    if (b.dataset.act === 'detail') saOpenDetail(row);
    else if (b.dataset.act === 'edit') saOpenForm('edit', row);
    else if (b.dataset.act === 'delete') saAskDelete(row);
  }));
}

/* ============================================================ 抽屉：新建 / 编辑 / 详情 ============================================================ */
function saOpenForm(mode, row) {
  const p = saPAGES[saCurrent]; const isEdit = mode === 'edit';
  $('#sa-sheet-title').textContent = (isEdit ? '编辑' : '新建') + ' · ' + p.title;
  let body = '<div class="form-grid">';
  p.form.forEach(f => { body += saFieldHTML(f, row || {}, 'form'); });
  body += '</div>';
  if (p.id === 'role' && p.customDetail) { /* 编辑态不显示只读摘要 */ }
  $('#sa-sheet-body').innerHTML = body;
  if (p.id === 'role' && p.customDetail) { /* 编辑态不显示只读摘要 */ }
  $('#sa-sheet-footer').innerHTML = '<button class="btn btn-outline" id="sa-sheet-cancel">取消</button><button class="btn btn-primary" id="sa-sheet-save">' + (isEdit ? '保存' : '创建') + '</button>';
  saOpenSheet();
  $('#sa-sheet-cancel').addEventListener('click', saCloseSheet);
  $('#sa-sheet-save').addEventListener('click', () => saSaveForm(p, isEdit, row));
}
function saOpenDetail(row) {
  const p = saPAGES[saCurrent]; const r = saDecorate(p, row);
  $('#sa-sheet-title').textContent = '详情 · ' + p.title;
  let body = '<div class="form-grid">';
  p.form.forEach(f => { body += saFieldHTML(f, r, 'detail'); });
  body += '</div>';
  if (p.customDetail) body += p.customDetail(r);
  $('#sa-sheet-body').innerHTML = body;
  $('#sa-sheet-footer').innerHTML = p.readonly ? '<button class="btn btn-outline" id="sa-sheet-cancel">关闭</button>' : '<button class="btn btn-outline" id="sa-sheet-cancel">关闭</button><button class="btn btn-primary" id="sa-sheet-edit">编辑</button>';
  saOpenSheet();
  $('#sa-sheet-cancel').addEventListener('click', saCloseSheet);
  if (!p.readonly) $('#sa-sheet-edit').addEventListener('click', () => saOpenForm('edit', row));
}
function saSaveForm(p, isEdit, row) {
  const data = {};
  let ok = true;
  p.form.forEach(f => {
    if (f.type === 'tree') {
      data[f.key] = $all('#sa-sheet-body .pt-cb:checked').map(c => c.value);
    } else {
      const el = $('#sa-sheet-body [data-key="' + f.key + '"]');
      if (!el) return;
      let v = el.type === 'checkbox' ? (el.checked ? 1 : 0) : el.value.trim();
      if (f.type === 'number') v = v === '' ? '' : Number(v);
      else if (f.type === 'select' && f.options && typeof f.options[0].value === 'number' && v !== '') v = Number(v);
      if (f.required && (v === '' || v == null)) { ok = false; el.style.borderColor = 'hsl(var(--destructive))'; }
      data[f.key] = v;
    }
  });
  if (!ok) { saToast('请填写必填项'); return; }
  const store = saEnsureData(saCurrent);
  if (isEdit) { Object.assign(row, data); saToast('已保存'); }
  else { data.id = Math.max(0, ...store.map(r => r.id)) + 1; store.unshift(data); saToast('已创建'); }
  saCloseSheet(); saRenderContent();
}
function saOpenSheet() { $('#sa-sheet-overlay').classList.add('open'); $('#sa-sheet-panel').classList.add('open'); }
function saCloseSheet() { $('#sa-sheet-overlay').classList.remove('open'); $('#sa-sheet-panel').classList.remove('open'); }

/* 轻提示（持久 #sa-toast，避免与门户 #toast 冲突） */
let saToastTimer = null;
function saToast(msg) {
  const t = document.getElementById('sa-toast'); if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  if (saToastTimer) clearTimeout(saToastTimer);
  saToastTimer = setTimeout(function () { t.classList.remove('show'); }, 2000);
}

/* 删除确认 */
let saPendingDelete = null;
function saAskDelete(row) {
  const p = saPAGES[saCurrent];
  if (p.id === 'user' && row.is_tenant_admin === 1) { saToast('租户管理员不可删除'); return; }
  saPendingDelete = row;
  $('#sa-confirm-text').textContent = '确定要删除「' + (row.name || row.username || row.code || row.title || '该记录') + '」吗？此操作不可撤销。';
  $('#sa-confirm-overlay').classList.add('open');
}
$('#sa-confirm-ok').addEventListener('click', () => {
  if (saPendingDelete) { const store = saEnsureData(saCurrent); const i = store.indexOf(saPendingDelete); if (i >= 0) store.splice(i, 1); saToast('已删除'); }
  saPendingDelete = null; $('#sa-confirm-overlay').classList.remove('open'); saRenderContent();
});
$('#sa-confirm-cancel').addEventListener('click', () => { saPendingDelete = null; $('#sa-confirm-overlay').classList.remove('open'); });
Object.keys(saPAGES).forEach(function (k) { saPAGES[k].id = k; });

function saSelectPage(id) { saCurrent = id; saView.page = 1; saView.pageSize = 10; saView.filters = {}; saRenderContent(); }
(function bindSaDrawers() {
  const ov = $('#sa-sheet-overlay'); if (ov) ov.addEventListener('click', saCloseSheet);
  const cl = $('#sa-sheet-close'); if (cl) { cl.innerHTML = icon('x', 'ic-sm'); cl.addEventListener('click', saCloseSheet); }
})();

</script>
</body>
</html>
