<!DOCTYPE html>
<!-- 设计系统：企业靛 shadcn（与 mis-portal-prototype.html / portal-design-tokens.md 1:1 一致） -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>系统管理控制台 · 高保真设计模板</title>
<style>
/* ============================================================ 令牌（Light / Dark） ============================================================ */
:root {
  --background: 214 32% 96.5%;
  --foreground: 222.2 47% 11%;
  --card: 0 0% 100%;
  --card-foreground: 222.2 47% 11%;
  --popover: 0 0% 100%;
  --popover-foreground: 222.2 47% 11%;
  --muted: 214 32% 93%;
  --muted-foreground: 215 19% 42%;
  --border: 214 30% 88%;
  --input: 214 30% 88%;
  --ring: 243 75% 59%;
  --sidebar: 214 32% 90%;
  --sidebar-foreground: 222 47% 11%;
  --sidebar-border: 214 30% 82%;
  --sidebar-accent: 214 32% 84%;
  --sidebar-muted: 215 16% 45%;
  --primary: 243 75% 59%;
  --primary-foreground: 0 0% 100%;
  --secondary: 214 32% 93%;
  --secondary-foreground: 222.2 47% 11%;
  --accent: 214 32% 93%;
  --accent-foreground: 222.2 47% 11%;
  --destructive: 0 72% 51%;
  --destructive-foreground: 0 0% 100%;
  --success: 142 71% 40%;
  --success-foreground: 0 0% 100%;
  --warning: 35 92% 48%;
  --warning-foreground: 35 92% 12%;
  --info: 199 89% 46%;
  --info-foreground: 0 0% 100%;
  --radius: 0.375rem;
  --sidebar-width: 16rem;
  --header-height: 3.5rem;
  --card-shadow: 0 1px 2px rgb(15 23 42 / .04), 0 2px 6px -2px rgb(15 23 42 / .08);
  --card-hover-shadow: 0 10px 30px -12px rgb(15 23 42 / .22);
  --portal-card-accent: 243 75% 59%;
  --motion-enter: 200ms cubic-bezier(0.4, 0, 0.2, 1);
  --motion-hover: 150ms cubic-bezier(0.4, 0, 0.2, 1);
}
.dark {
  --background: 222 47% 7%;
  --foreground: 210 40% 96%;
  --card: 222 40% 12%;
  --card-foreground: 210 40% 96%;
  --popover: 222 40% 12%;
  --popover-foreground: 210 40% 96%;
  --muted: 217.2 33% 18%;
  --muted-foreground: 215 20% 68%;
  --border: 217.2 33% 20%;
  --input: 217.2 33% 20%;
  --ring: 243 75% 66%;
  --sidebar: 217 33% 14%;
  --sidebar-foreground: 210 40% 96%;
  --sidebar-border: 217 33% 22%;
  --sidebar-accent: 217 33% 20%;
  --sidebar-muted: 215 18% 62%;
  --primary: 243 75% 66%;
  --primary-foreground: 222.2 47.4% 11%;
  --secondary: 217.2 32.6% 17.5%;
  --secondary-foreground: 210 40% 98%;
  --accent: 217.2 32.6% 17.5%;
  --accent-foreground: 210 40% 98%;
  --destructive: 0 62.8% 45%;
  --destructive-foreground: 210 40% 98%;
  --success: 142 69% 55%;
  --success-foreground: 144 80% 10%;
  --warning: 38 92% 58%;
  --warning-foreground: 38 92% 12%;
  --info: 199 89% 56%;
  --info-foreground: 199 90% 10%;
  --card-shadow: 0 1px 2px rgb(0 0 0 / .4), 0 2px 8px -2px rgb(0 0 0 / .5);
  --card-hover-shadow: 0 12px 32px -12px rgb(0 0 0 / .6);
  --portal-card-accent: 243 75% 66%;
}

/* ============================================================ 基础 ============================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; height: 100%; }
body {
  margin: 0; font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
  background: hsl(var(--background)); color: hsl(var(--foreground));
  line-height: 1.6; height: 100%; -webkit-font-smoothing: antialiased;
}
.hidden { display: none !important; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
.ic { width: 1.25rem; height: 1.25rem; } .ic-sm { width: 1rem; height: 1rem; } .ic-xs { width: .875rem; height: .875rem; }

/* 按钮 */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: .4rem; font-weight: 500;
  border: 1px solid transparent; border-radius: var(--radius); padding: .5rem .85rem; font-size: .875rem;
  transition: all var(--motion-hover); user-select: none; min-height: 2.25rem; }
.btn:focus-visible { outline: 2px solid hsl(var(--ring)); outline-offset: 2px; }
.btn:disabled { opacity: .55; cursor: not-allowed; pointer-events: none; }
.btn-primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }
.btn-primary:hover { filter: brightness(.95); transform: translateY(-1px); box-shadow: var(--card-shadow); }
.btn-outline { border-color: hsl(var(--border)); background: hsl(var(--card)); }
.btn-outline:hover { background: hsl(var(--accent)); color: hsl(var(--accent-foreground)); }
.btn-ghost:hover { background: hsl(var(--accent)); color: hsl(var(--accent-foreground)); }
.btn-destructive { background: hsl(var(--destructive)); color: hsl(var(--destructive-foreground)); }
.btn-destructive:hover { filter: brightness(.95); }
.btn-sm { padding: .3rem .6rem; min-height: 2rem; font-size: .8125rem; }
.icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 2.25rem; height: 2.25rem;
  border: none; background: transparent; color: hsl(var(--muted-foreground)); border-radius: var(--radius); transition: all var(--motion-hover); }
.icon-btn:hover { background: hsl(var(--accent)); color: hsl(var(--accent-foreground)); }

/* 输入 */
.input { width: 100%; padding: .55rem .7rem; font-size: .875rem; font-family: inherit; color: hsl(var(--foreground));
  background: hsl(var(--card)); border: 1px solid hsl(var(--input)); border-radius: var(--radius); transition: all var(--motion-hover); }
.input:focus { outline: none; border-color: hsl(var(--primary)); box-shadow: 0 0 0 3px hsl(var(--primary) / .15); }
textarea.input { resize: vertical; min-height: 4.5rem; }
.field-label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: .4rem; }
.required { color: hsl(var(--destructive)); margin-left: 2px; }

/* 徽标 / chip */
.badge-status { display: inline-flex; align-items: center; gap: .375rem; border-radius: 9999px; padding: .125rem .625rem; font-size: .75rem; font-weight: 500; }
.badge-status .dot { width: .375rem; height: .375rem; border-radius: 9999px; }
.badge-status.success { background: hsl(var(--success) / .12); color: hsl(var(--success)); } .badge-status.success .dot { background: hsl(var(--success)); }
.badge-status.warning { background: hsl(var(--warning) / .12); color: hsl(var(--warning)); } .badge-status.warning .dot { background: hsl(var(--warning)); }
.badge-status.info { background: hsl(var(--info) / .12); color: hsl(var(--info)); } .badge-status.info .dot { background: hsl(var(--info)); }
.badge-status.destructive { background: hsl(var(--destructive) / .12); color: hsl(var(--destructive)); } .badge-status.destructive .dot { background: hsl(var(--destructive)); }
.badge-status.muted { background: hsl(var(--muted-foreground) / .12); color: hsl(var(--muted-foreground)); } .badge-status.muted .dot { background: hsl(var(--muted-foreground)); }
.chip-badge { display: inline-flex; align-items: center; padding: .1rem .5rem; border-radius: 9999px; font-size: .7rem; font-weight: 600; }
.chip-badge.primary { background: hsl(var(--primary) / .12); color: hsl(var(--primary)); }
.chip-badge.warning { background: hsl(var(--warning) / .14); color: hsl(var(--warning)); }

/* 卡片 / 表单栅格 */
.card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); box-shadow: var(--card-shadow); }
.form-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: .875rem 1rem; }
.col-2 { grid-column: span 2; } .col-3 { grid-column: span 3; } .col-4 { grid-column: span 4; }
.col-6 { grid-column: span 6; } .col-8 { grid-column: span 8; } .col-12 { grid-column: span 12; }
@media (max-width: 900px) { .col-2, .col-3, .col-4 { grid-column: span 6; } .col-6, .col-8 { grid-column: span 12; } }
@media (max-width: 560px) { .col-2, .col-3, .col-4, .col-6, .col-8 { grid-column: span 12; } }

/* 开关 */
.switch { position: relative; display: inline-flex; align-items: center; gap: .5rem; cursor: pointer; user-select: none; }
.switch input { position: absolute; opacity: 0; width: 0; height: 0; }
.switch .track { width: 2.25rem; height: 1.25rem; border-radius: 9999px; background: hsl(var(--muted-foreground) / .4); transition: all var(--motion-hover); }
.switch .track::after { content: ""; position: absolute; left: 2px; top: 2px; width: 1rem; height: 1rem; border-radius: 9999px; background: #fff; transition: all var(--motion-hover); }
.switch input:checked + .track { background: hsl(var(--primary)); }
.switch input:checked + .track::after { transform: translateX(1rem); }
.switch input:focus-visible + .track { outline: 2px solid hsl(var(--ring)); outline-offset: 2px; }

/* 筛选卡 + 状态 tab */
.filter-card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
.filter-card .fc-body { padding: .875rem 1rem; }
.filter-card .fc-actions { display: flex; justify-content: flex-end; gap: .5rem; padding: .75rem 1rem; border-top: 1px solid hsl(var(--border)); background: hsl(var(--muted) / .35); }
.status-tabs { display: flex; align-items: center; gap: 1.5rem; border-bottom: 1px solid hsl(var(--border)); margin-bottom: 1rem; overflow-x: auto; }
.status-tab { position: relative; padding: .625rem 0; background: none; border: none; color: hsl(var(--muted-foreground)); font-size: .875rem; font-weight: 500; white-space: nowrap; }
.status-tab.active { color: hsl(var(--foreground)); }
.status-tab.active::after { content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: hsl(var(--primary)); border-radius: 2px; }
.status-tab .count { margin-left: .35rem; font-size: .72rem; color: hsl(var(--muted-foreground)); }

/* 表格（表头吸顶） */
.table-wrap { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
.table-scroll { flex: 1; overflow: auto; overscroll-behavior: contain; }
.table-scroll table { width: 100%; border-collapse: collapse; }
.table-scroll thead th { position: sticky; top: 0; z-index: 2; background: hsl(var(--muted) / .6); backdrop-filter: blur(2px);
  text-align: left; font-size: .75rem; font-weight: 600; color: hsl(var(--muted-foreground)); padding: .625rem 1rem; border-bottom: 1px solid hsl(var(--border)); white-space: nowrap; }
.table-scroll tbody td { padding: .7rem 1rem; font-size: .875rem; border-bottom: 1px solid hsl(var(--border)); vertical-align: middle; }
.table-scroll tbody tr:last-child td { border-bottom: none; }
.table-scroll tbody tr { transition: background var(--motion-hover); }
.table-scroll tbody tr:hover { background: hsl(var(--muted) / .4); }
.row-actions { display: flex; gap: .25rem; }
.link-btn { background: none; border: none; color: hsl(var(--primary)); font-size: .8125rem; padding: .2rem .4rem; border-radius: var(--radius); }
.link-btn:hover { background: hsl(var(--primary) / .1); }
.link-btn.danger { color: hsl(var(--destructive)); }
.link-btn.danger:hover { background: hsl(var(--destructive) / .1); }
.empty { padding: 3rem 1rem; text-align: center; color: hsl(var(--muted-foreground)); }

/* 分页 */
.pager { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: .75rem 1rem; flex-wrap: wrap; }
.pager-info { font-size: .8125rem; color: hsl(var(--muted-foreground)); } .pager-info b { color: hsl(var(--foreground)); }
.pager-controls { display: flex; align-items: center; gap: .25rem; }
.pager-btn { min-width: 2rem; height: 2rem; padding: 0 .5rem; border: 1px solid hsl(var(--border)); background: hsl(var(--card)); border-radius: var(--radius); font-size: .8125rem; color: hsl(var(--foreground)); }
.pager-btn:hover:not(:disabled):not(.active) { background: hsl(var(--muted) / .6); }
.pager-btn.active { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); border-color: hsl(var(--primary)); font-weight: 600; }
.pager-btn:disabled { opacity: .4; cursor: not-allowed; }
.pager-ellipsis { min-width: 1.5rem; text-align: center; color: hsl(var(--muted-foreground)); }
.pager-size { display: flex; align-items: center; gap: .375rem; font-size: .8125rem; color: hsl(var(--muted-foreground)); }
.pager-size select { padding: .25rem .4rem; border: 1px solid hsl(var(--border)); border-radius: var(--radius); background: hsl(var(--card)); color: hsl(var(--foreground)); }

/* ============================================================ 应用外壳 ============================================================ */
.app { position: fixed; inset: 0; display: flex; flex-direction: column; }
.topbar { height: var(--header-height); flex-shrink: 0; display: flex; align-items: center; gap: .75rem; padding: 0 1rem;
  background: hsl(var(--card)); border-bottom: 1px solid hsl(var(--border)); }
.topbar .brand { display: flex; align-items: center; gap: .55rem; font-weight: 700; font-size: 1rem; }
.topbar .brand .logo { width: 1.9rem; height: 1.9rem; border-radius: var(--radius); background: hsl(var(--primary)); color: #fff;
  display: inline-flex; align-items: center; justify-content: center; }
.topbar .spacer { flex: 1; }
.topbar .tenant { font-size: .8125rem; color: hsl(var(--muted-foreground)); display: flex; align-items: center; gap: .4rem; }
.topbar .avatar { width: 2rem; height: 2rem; border-radius: 9999px; background: hsl(var(--primary) / .15); color: hsl(var(--primary));
  display: inline-flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 600; }

.shell-body { flex: 1; display: flex; min-height: 0; }
.sidebar { width: var(--sidebar-width); flex-shrink: 0; background: hsl(var(--sidebar)); border-right: 1px solid hsl(var(--sidebar-border));
  overflow-y: auto; padding: .75rem .5rem; }
.nav-group { margin-bottom: .5rem; }
.nav-group-label { font-size: .7rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: hsl(var(--sidebar-muted));
  padding: .5rem .75rem .25rem; }
.nav-item { display: flex; align-items: center; gap: .6rem; width: 100%; box-sizing: border-box; text-align: left;
  background: transparent; border: none; color: hsl(var(--sidebar-foreground)); padding: .5rem .75rem; border-radius: var(--radius);
  font-size: .875rem; transition: all var(--motion-hover); position: relative; }
.nav-item:hover { background: hsl(var(--sidebar-accent)); }
.nav-item.active { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); font-weight: 600; }
.nav-item.active .ni-ic { color: hsl(var(--primary-foreground)); }
.nav-item .ni-ic { color: hsl(var(--sidebar-muted)); flex-shrink: 0; }
.nav-item .ni-label { flex: 1; }
.nav-item .ni-badge { font-size: .68rem; background: hsl(var(--destructive) / .15); color: hsl(var(--destructive)); padding: .05rem .4rem; border-radius: 9999px; }

.main { flex: 1; min-width: 0; display: flex; flex-direction: column; min-height: 0; }
.page-head { flex-shrink: 0; display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; padding: 1.1rem 1.25rem .75rem; flex-wrap: wrap; }
.page-head .ph-title { font-size: 1.25rem; font-weight: 700; }
.page-head .ph-crumb { font-size: .78rem; color: hsl(var(--muted-foreground)); margin-bottom: .25rem; }
.page-head .ph-crumb b { color: hsl(var(--foreground)); }
.page-head .ph-desc { font-size: .8125rem; color: hsl(var(--muted-foreground)); margin-top: .2rem; }
.content { flex: 1; min-height: 0; overflow-y: auto; padding: 0 1.25rem 1.25rem; }

/* ============================================================ 抽屉（新建/编辑/详情共用） ============================================================ */
.sheet-overlay { position: fixed; inset: 0; background: rgb(15 23 42 / .45); opacity: 0; pointer-events: none; transition: opacity var(--motion-enter); z-index: 50; }
.sheet-overlay.open { opacity: 1; pointer-events: auto; }
.sheet-panel { position: fixed; top: 0; right: 0; height: 100%; width: 32rem; max-width: 92vw; background: hsl(var(--card));
  border-left: 1px solid hsl(var(--border)); box-shadow: -12px 0 40px -12px rgb(15 23 42 / .35); transform: translateX(100%);
  transition: transform var(--motion-enter); z-index: 51; display: flex; flex-direction: column; }
.sheet-panel.open { transform: none; }
.sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid hsl(var(--border)); }
.sheet-title { font-size: 1.05rem; font-weight: 600; }
.sheet-body { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
.sheet-footer { padding: 1rem 1.25rem; border-top: 1px solid hsl(var(--border)); display: flex; justify-content: flex-end; gap: .5rem; }
.ro-field { display: grid; grid-template-columns: 9rem 1fr; gap: .5rem; padding: .55rem 0; border-bottom: 1px dashed hsl(var(--border)); }
.ro-field .ro-k { color: hsl(var(--muted-foreground)); font-size: .8125rem; }
.ro-field .ro-v { font-size: .875rem; word-break: break-all; }
.perm-tree { border: 1px solid hsl(var(--border)); border-radius: var(--radius); padding: .75rem; max-height: 18rem; overflow: auto; }
.perm-tree ul { list-style: none; padding-left: 1.1rem; }
.perm-tree > ul { padding-left: 0; }
.perm-tree li { padding: .15rem 0; }
.perm-tree label { display: inline-flex; align-items: center; gap: .4rem; font-size: .85rem; cursor: pointer; }
.perm-tree .pt-cat { font-weight: 600; }

/* 删除确认 */
.confirm-overlay { position: fixed; inset: 0; background: rgb(15 23 42 / .45); display: none; align-items: center; justify-content: center; z-index: 60; }
.confirm-overlay.open { display: flex; }
.confirm-box { width: 24rem; max-width: 92vw; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); box-shadow: var(--card-hover-shadow); padding: 1.25rem; }
.confirm-box h3 { font-size: 1rem; margin-bottom: .5rem; }
.confirm-box p { font-size: .875rem; color: hsl(var(--muted-foreground)); margin-bottom: 1rem; }
.confirm-box .cf-actions { display: flex; justify-content: flex-end; gap: .5rem; }

/* 提示 toast */
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(1rem); background: hsl(var(--foreground)); color: hsl(var(--background));
  padding: .6rem 1rem; border-radius: var(--radius); font-size: .85rem; opacity: 0; transition: all var(--motion-enter); z-index: 70; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <!-- 顶栏 -->
  <header class="topbar">
    <div class="brand"><span class="logo" id="brand-logo"></span> 系统管理控制台</div>
    <div class="spacer"></div>
    <span class="tenant"><span id="tenant-ic"></span> 默认租户 · mis_platform</span>
    <button class="icon-btn" id="theme-toggle" aria-label="切换主题" title="切换主题"></button>
    <span class="avatar">AD</span>
  </header>

  <div class="shell-body">
    <!-- 侧栏分组导航 -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- 主区 -->
    <main class="main">
      <div class="page-head">
        <div>
          <div class="ph-crumb" id="ph-crumb">系统管理 / <b id="ph-group">—</b> / <b id="ph-title">—</b></div>
          <div class="ph-title" id="ph-title2">—</div>
          <div class="ph-desc" id="ph-desc">—</div>
        </div>
        <div class="page-actions" id="ph-actions"></div>
      </div>
      <div class="content" id="content"></div>
    </main>
  </div>
</div>

<!-- 抽屉 -->
<div class="sheet-overlay" id="sheet-overlay"></div>
<aside class="sheet-panel" id="sheet-panel" aria-label="记录详情/编辑">
  <div class="sheet-header">
    <div class="sheet-title" id="sheet-title">—</div>
    <button class="icon-btn" id="sheet-close" aria-label="关闭"></button>
  </div>
  <div class="sheet-body" id="sheet-body"></div>
  <div class="sheet-footer" id="sheet-footer"></div>
</aside>

<!-- 删除确认 -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>确认删除</h3>
    <p id="confirm-text">确定要删除该记录吗？此操作不可撤销。</p>
    <div class="cf-actions">
      <button class="btn btn-outline" id="confirm-cancel">取消</button>
      <button class="btn btn-destructive" id="confirm-ok">删除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================ 图标 ============================================================ */
const ICONS = {
  layoutDashboard: '<rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>',
  shield: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>',
  network: '<rect x="9" y="2" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="16" y="16" width="6" height="6" rx="1"/><path d="M12 8v4M12 12H5v4M12 12h7v4"/>',

/* 派生展示字段 */
function decorate(page, row) {
  const r = Object.assign({}, row);
  if ('status' in r) r.statusText = r.status === 1 ? '启用' : (r.status === 2 ? '锁定' : '禁用');
  if ('gender' in r) r.genderText = r.gender === 1 ? '男' : (r.gender === 2 ? '女' : '—');
  if ('type' in r) {
    if (page.id === 'role') r.typeText = r.type === 1 ? '内置' : '自定义';
    else if (page.id === 'menu') r.typeText = r.type === 1 ? '目录' : (r.type === 2 ? '菜单' : '按钮');
    else if (page.id === 'api') r.typeText = r.type === 'catalog' ? '目录' : '接口';
  }
  if ('data_scope' in r) { const d = DATA_SCOPE.find(x => x.value === r.data_scope); r.dataScopeText = d ? d.label : '—'; }
  if (page.id === 'role') r.userCount = (r.users || []).length;
  if (page.id === 'dict') r.itemCount = (r.items || '').split('\n').filter(Boolean).length;
  return r;
}

/* ============================================================ 状态与渲染 ============================================================ */
let currentPage = 'org';
const dataStore = {};          // id -> 行数组（可增删改）
const view = { page: 1, pageSize: 10, filters: {} };

function ensureData(id) { if (!dataStore[id]) dataStore[id] = PAGES[id].sample.map(r => Object.assign({}, r)); return dataStore[id]; }

function renderSidebar() {
  const groups = {};
  Object.keys(PAGES).forEach(id => { const g = PAGES[id].group; (groups[g] = groups[g] || []).push(id); });
  let html = '';
  Object.keys(groups).forEach(g => {
    html += '<div class="nav-group"><div class="nav-group-label">' + esc(g) + '</div>';
    groups[g].forEach(id => {
      const p = PAGES[id];
      html += '<button class="nav-item' + (id === currentPage ? ' active' : '') + '" data-page="' + id + '">' +
        '<span class="ni-ic">' + icon(p.icon, 'ic-sm') + '</span><span class="ni-label">' + esc(p.title) + '</span></button>';
    });
    html += '</div>';
  });
  $('#sidebar').innerHTML = html;
  $all('#sidebar .nav-item').forEach(b => b.addEventListener('click', () => selectPage(b.dataset.page)));
}

function selectPage(id) {
  currentPage = id; view.page = 1; view.filters = {};
  renderSidebar(); paintPage();
}

function paintPage() {
  const p = PAGES[currentPage];
  $('#ph-group').textContent = p.group;
  $('#ph-title').textContent = p.title;
  $('#ph-title2').textContent = p.title;
  $('#ph-desc').textContent = p.desc;
  $('#ph-actions').innerHTML = p.readonly ? '' : '<button class="btn btn-primary" id="btn-add">' + icon('plus', 'ic-sm') + ' 新建</button>';
  if (!p.readonly) $('#btn-add').addEventListener('click', () => openForm('create'));
  renderContent();
}

function renderContent() {
  const p = PAGES[currentPage];
  const rows = ensureData(currentPage).map(r => decorate(p, r));
  const filtered = rows.filter(r => {
    return Object.keys(view.filters).every(k => {
      const f = (p.filters || []).find(x => x.key === k); if (!f) return true;
      const v = view.filters[k]; if (v === '' || v == null) return true;
      const cell = r[k];
      if (f.type === 'select') return String(cell) === String(v);
      return String(cell == null ? '' : cell).toLowerCase().includes(String(v).toLowerCase());
    });
  });
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / view.pageSize));
  if (view.page > pages) view.page = pages;
  const start = (view.page - 1) * view.pageSize;
  const slice = filtered.slice(start, start + view.pageSize);

  const filterHtml = (p.filters || []).length ? buildFilterCard(p) : '';
  const tableHtml = buildTable(p, slice);
  const pagerHtml = buildPager(total, start, slice.length);
  $('#content').innerHTML = filterHtml + tableHtml + pagerHtml;

  bindFilters(p);
  bindPager();
  bindRowActions(p);
}

function buildFilterCard(p) {
  let fields = '<div class="form-grid">';
  (p.filters || []).forEach(f => { fields += '<div class="col-' + (f.col || 4) + '">' + fieldHTML(f, {}, 'filter') + '</div>'; });
  fields += '</div>';
  return '<div class="filter-card"><div class="fc-body">' + fields + '</div>' +
    '<div class="fc-actions"><button class="btn btn-outline btn-sm" id="fc-reset">重置</button>' +
    '<button class="btn btn-primary btn-sm" id="fc-search">' + icon('search', 'ic-sm') + ' 查询</button></div></div>';
}
function fieldHTML(f, row, mode) {
  const val = row[f.key];
  const lbl = mode === 'filter' ? f.label : (f.label + (f.required ? '<span class="required">*</span>' : ''));
  if (mode === 'detail') {
    if (f.type === 'tree') return '';
    let v = val;
    if (f.type === 'switch') v = (val === 1 || val === true) ? '启用' : '禁用';
    else if (f.type === 'select') { const o = (f.options || []).find(x => String(x.value) === String(val)); v = o ? o.label : (val || '—'); }
    return '<div class="ro-field"><span class="ro-k">' + esc(f.label) + '</span><span class="ro-v">' + esc(v == null || v === '' ? '—' : v) + '</span></div>';
  }
  let ctrl;
  if (f.type === 'switch') {
    const on = (val === 1 || val === true) ? 'checked' : '';
    ctrl = '<label class="switch"><input type="checkbox" data-key="' + f.key + '" ' + on + '><span class="track"></span><span>' + (on ? '启用' : '禁用') + '</span></label>';
  } else if (f.type === 'select') {
    let opts = '<option value="">请选择</option>';
    (f.options || []).forEach(o => { opts += '<option value="' + esc(o.value) + '"' + (String(val) === String(o.value) ? ' selected' : '') + '>' + esc(o.label) + '</option>'; });
    ctrl = '<select class="input" data-key="' + f.key + '">' + opts + '</select>';
  } else if (f.type === 'textarea') {
    ctrl = '<textarea class="input" data-key="' + f.key + '" placeholder="' + esc(f.placeholder || '') + '">' + esc(val || '') + '</textarea>';
  } else if (f.type === 'tree') {
    ctrl = buildPermTree(val || []);
  } else {
    const t = f.type === 'number' ? 'type="number"' : 'type="text"';
    ctrl = '<input class="input" ' + t + ' data-key="' + f.key + '" value="' + esc(val || '') + '" placeholder="' + esc(f.placeholder || '') + '">';
  }
  return '<div class="col-' + (f.col || 6) + '"><label class="field-label">' + lbl + '</label>' + ctrl + '</div>';
}
function buildPermTree(checked) {
  function node(n) {
    const has = checked.includes(n.id);
    let h = '<li><label><input type="checkbox" class="pt-cb" value="' + n.id + '"' + (has ? ' checked' : '') + '> ' + esc(n.name) + '</label>';
    if (n.children) { h += '<ul>' + n.children.map(node).join('') + '</ul>'; }
    return h + '</li>';
  }
  return '<div class="perm-tree"><ul>' + MENU_TREE.map(node).join('') + '</ul></div>';
}
function buildTable(p, rows) {
  let head = '<tr>' + p.columns.map(c => '<th>' + esc(c.label) + '</th>').join('') + (p.readonly ? '<th>操作</th>' : '<th>操作</th>') + '</tr>';
  let body = '';
  if (!rows.length) {
    body = '<tr><td class="empty" colspan="' + (p.columns.length + 1) + '">暂无数据</td></tr>';
  } else {
    rows.forEach(r => {
      const actions = p.readonly
        ? '<button class="link-btn" data-act="detail" data-id="' + r.id + '">详情</button>'
        : '<button class="link-btn" data-act="detail" data-id="' + r.id + '">' + icon('eye', 'ic-xs') + ' 详情</button>' +
          '<button class="link-btn" data-act="edit" data-id="' + r.id + '">' + icon('edit', 'ic-xs') + ' 编辑</button>' +
          '<button class="link-btn danger" data-act="delete" data-id="' + r.id + '">' + icon('trash', 'ic-xs') + ' 删除</button>';
      body += '<tr>' + p.columns.map(c => cellFor(c, r)).join('') + '<td><div class="row-actions">' + actions + '</div></td></tr>';
    });
  }
  return '<div class="table-wrap"><div class="table-scroll"><table><thead>' + head + '</thead><tbody>' + body + '</tbody></table></div></div>';
}
function statusCls(s) { return s === 1 ? 'success' : (s === 2 ? 'warning' : 'muted'); }
function cellFor(c, r) {
  if (c.status) return '<td><span class="badge-status ' + statusCls(r.status) + '"><span class="dot"></span>' + esc(r[c.key]) + '</span></td>';
  let v = r[c.key]; if (v == null || v === '') v = '—';
  return '<td>' + esc(v) + '</td>';
}
function buildPager(total, start, count) {
  const pages = Math.max(1, Math.ceil(total / view.pageSize));
  let nums = '';
  const cur = view.page;
  const range = [];
  if (pages <= 7) { for (let i = 1; i <= pages; i++) range.push(i); }
  else {
    range.push(1); if (cur > 3) range.push('...');
    for (let i = Math.max(2, cur - 1); i <= Math.min(pages - 1, cur + 1); i++) range.push(i);
    if (cur < pages - 2) range.push('...'); range.push(pages);
  }
  range.forEach(i => { nums += i === '...' ? '<span class="pager-ellipsis">…</span>' : '<button class="pager-btn' + (i === cur ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>'; });
  return '<div class="pager"><div class="pager-info">共 <b>' + total + '</b> 条，当前 ' + (total ? (start + 1) + '-' + (start + count) : '0') + '</div>' +
    '<div class="pager-controls">' +
    '<button class="pager-btn" data-page="prev"' + (cur <= 1 ? ' disabled' : '') + '>上一页</button>' + nums +
    '<button class="pager-btn" data-page="next"' + (cur >= pages ? ' disabled' : '') + '>下一页</button></div>' +
    '<div class="pager-size"><label>每页</label><select id="page-size">' + [10, 20, 50].map(n => '<option value="' + n + '"' + (n === view.pageSize ? ' selected' : '') + '>' + n + ' 条</option>').join('') + '</select></div></div>';
}

/* 绑定 */
function bindFilters(p) {
  if (!p.filters || !p.filters.length) return;
  const fc = $('#content .filter-card'); if (!fc) return;
  (p.filters || []).forEach(f => { const el = fc.querySelector('[data-key="' + f.key + '"]'); if (el) el.value = view.filters[f.key] != null ? view.filters[f.key] : ''; });
  $('#fc-search').addEventListener('click', () => {
    view.filters = {}; (p.filters || []).forEach(f => { const el = fc.querySelector('[data-key="' + f.key + '"]'); if (el) view.filters[f.key] = el.value; });
    view.page = 1; renderContent();
  });
  $('#fc-reset').addEventListener('click', () => { view.filters = {}; renderContent(); });
}
function bindPager() {
  const c = $('#content .pager'); if (!c) return;
  c.querySelectorAll('.pager-btn').forEach(b => b.addEventListener('click', () => {
    const t = b.dataset.page; const pages = Math.max(1, Math.ceil(currentRowsTotal() / view.pageSize));
    if (t === 'prev') view.page = Math.max(1, view.page - 1);
    else if (t === 'next') view.page = Math.min(pages, view.page + 1);
    else view.page = Number(t);
    renderContent();
  }));
  const ps = $('#page-size'); if (ps) ps.addEventListener('change', () => { view.pageSize = Number(ps.value); view.page = 1; renderContent(); });
}
function currentRowsTotal() {
  const p = PAGES[currentPage]; const rows = ensureData(currentPage).map(r => decorate(p, r));
  return rows.filter(r => Object.keys(view.filters).every(k => {
    const f = (p.filters || []).find(x => x.key === k); if (!f) return true; const v = view.filters[k]; if (v === '' || v == null) return true;
    const cell = r[k]; if (f.type === 'select') return String(cell) === String(v);
    return String(cell == null ? '' : cell).toLowerCase().includes(String(v).toLowerCase());
  })).length;
}
function bindRowActions(p) {
  $all('#content [data-act]').forEach(b => b.addEventListener('click', () => {
    const id = Number(b.dataset.id); const row = ensureData(currentPage).find(r => r.id === id);
    if (!row) return;
    if (b.dataset.act === 'detail') openDetail(row);
    else if (b.dataset.act === 'edit') openForm('edit', row);
    else if (b.dataset.act === 'delete') askDelete(row);
  }));
}

/* ============================================================ 抽屉：新建 / 编辑 / 详情 ============================================================ */
function openForm(mode, row) {
  const p = PAGES[currentPage]; const isEdit = mode === 'edit';
  $('#sheet-title').textContent = (isEdit ? '编辑' : '新建') + ' · ' + p.title;
  let body = '<div class="form-grid">';
  p.form.forEach(f => { body += fieldHTML(f, row || {}, 'form'); });
  body += '</div>';
  if (p.id === 'role' && p.customDetail) { /* 编辑态不显示只读摘要 */ }
  $('#sheet-body').innerHTML = body;
  if (p.id === 'role' && p.customDetail) { /* 编辑态不显示只读摘要 */ }
  $('#sheet-footer').innerHTML = '<button class="btn btn-outline" id="sheet-cancel">取消</button><button class="btn btn-primary" id="sheet-save">' + (isEdit ? '保存' : '创建') + '</button>';
  openSheet();
  $('#sheet-cancel').addEventListener('click', closeSheet);
  $('#sheet-save').addEventListener('click', () => saveForm(p, isEdit, row));
}
function openDetail(row) {
  const p = PAGES[currentPage]; const r = decorate(p, row);
  $('#sheet-title').textContent = '详情 · ' + p.title;
  let body = '<div class="form-grid">';
  p.form.forEach(f => { body += fieldHTML(f, r, 'detail'); });
  body += '</div>';
  if (p.customDetail) body += p.customDetail(r);
  $('#sheet-body').innerHTML = body;
  $('#sheet-footer').innerHTML = p.readonly ? '<button class="btn btn-outline" id="sheet-cancel">关闭</button>' : '<button class="btn btn-outline" id="sheet-cancel">关闭</button><button class="btn btn-primary" id="sheet-edit">编辑</button>';
  openSheet();
  $('#sheet-cancel').addEventListener('click', closeSheet);
  if (!p.readonly) $('#sheet-edit').addEventListener('click', () => openForm('edit', row));
}
function saveForm(p, isEdit, row) {
  const data = {};
  let ok = true;
  p.form.forEach(f => {
    if (f.type === 'tree') {
      data[f.key] = $all('#sheet-body .pt-cb:checked').map(c => c.value);
    } else {
      const el = $('#sheet-body [data-key="' + f.key + '"]');
      if (!el) return;
      let v = el.type === 'checkbox' ? (el.checked ? 1 : 0) : el.value.trim();
      if (f.type === 'number') v = v === '' ? '' : Number(v);
      else if (f.type === 'select' && f.options && typeof f.options[0].value === 'number' && v !== '') v = Number(v);
      if (f.required && (v === '' || v == null)) { ok = false; el.style.borderColor = 'hsl(var(--destructive))'; }
      data[f.key] = v;
    }
  });
  if (!ok) { toast('请填写必填项'); return; }
  const store = ensureData(currentPage);
  if (isEdit) { Object.assign(row, data); toast('已保存'); }
  else { data.id = Math.max(0, ...store.map(r => r.id)) + 1; store.unshift(data); toast('已创建'); }
  closeSheet(); renderContent();
}
function openSheet() { $('#sheet-overlay').classList.add('open'); $('#sheet-panel').classList.add('open'); }
function closeSheet() { $('#sheet-overlay').classList.remove('open'); $('#sheet-panel').classList.remove('open'); }

/* 删除确认 */
let pendingDelete = null;
function askDelete(row) {
  const p = PAGES[currentPage];
  if (p.id === 'user' && row.is_tenant_admin === 1) { toast('租户管理员不可删除'); return; }
  pendingDelete = row;
  $('#confirm-text').textContent = '确定要删除「' + (row.name || row.username || row.code || row.title || '该记录') + '」吗？此操作不可撤销。';
  $('#confirm-overlay').classList.add('open');
}
$('#confirm-ok').addEventListener('click', () => {
  if (pendingDelete) { const store = ensureData(currentPage); const i = store.indexOf(pendingDelete); if (i >= 0) store.splice(i, 1); toast('已删除'); }
  pendingDelete = null; $('#confirm-overlay').classList.remove('open'); renderContent();
});
$('#confirm-cancel').addEventListener('click', () => { pendingDelete = null; $('#confirm-overlay').classList.remove('open'); });

/* ============================================================ 杂项 ============================================================ */
function toggleTheme() { document.documentElement.classList.toggle('dark'); paintThemeIcon(); }
function paintThemeIcon() { $('#theme-toggle').innerHTML = document.documentElement.classList.contains('dark') ? icon('sun', 'ic-sm') : icon('moon', 'ic-sm'); }
let toastTimer;
function toast(msg) { const t = $('#toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 1800); }

/* ============================================================ 启动 ============================================================ */
$('#brand-logo').innerHTML = icon('layoutDashboard', 'ic');
$('#tenant-ic').innerHTML = icon('network', 'ic-xs');
$('#sheet-close').innerHTML = icon('x', 'ic-sm');
$('#sheet-overlay').addEventListener('click', closeSheet);
$('#theme-toggle').addEventListener('click', toggleTheme);
renderSidebar(); paintPage(); paintThemeIcon();
</script>
</body>
</html>
